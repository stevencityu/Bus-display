<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>衙前圍道巴士站 - 電子資訊牌</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --gold:#c8a400; --red:#e53935; --orange:#fb8c00; --green:#43a047;
  --bg:#0d0d0d; --bg2:#161616; --txt:#f0f0f0; --dim:#888;
}
html,body { height:100%; background:var(--bg); color:var(--txt); font-family:'Arial Black','Arial','Microsoft JhengHei',sans-serif; overflow:hidden; }
#app { display:none; -webkit-flex-direction:column; flex-direction:column; height:100vh; }
#app.show { display:-webkit-flex; display:flex; }

/* Header */
#header {
  background:var(--bg2); border-bottom:3px solid var(--gold);
  display:-webkit-flex; display:flex;
  -webkit-align-items:center; align-items:center;
  -webkit-justify-content:space-between; justify-content:space-between;
  padding:12px 18px; -webkit-flex-shrink:0; flex-shrink:0;
}
#stop-zh { font-size:28px; font-weight:900; letter-spacing:1px; }
#stop-en { font-size:13px; color:var(--dim); margin-top:2px; }
#clock { font-size:54px; font-weight:900; letter-spacing:2px; line-height:1; font-family: monospace; }
#dateline { font-size:12px; color:var(--dim); text-align:right; margin-top:4px; }

/* 主體左右分欄容器 */
#main-container {
  -webkit-flex:1; flex:1;
  display:-webkit-flex; display:flex;
  -webkit-flex-direction:row; flex-direction:row;
  min-height:0; overflow:hidden;
}

/* 固定巴士板總寬度 */
#eta-container {
  width: 560px;
  -webkit-flex-shrink: 0; flex-shrink: 0;
  display:-webkit-flex; display:flex;
  -webkit-flex-direction:column; flex-direction:column;
  min-height:0;
}

/* 欄位標頭 */
#col-hdr {
  display:-webkit-flex; display:flex;
  background:var(--gold); color:#000; font-weight:900; font-size:14px;
  padding:6px 14px; -webkit-flex-shrink:0; flex-shrink:0;
}
#col-hdr .c1 { width:110px; }
#col-hdr .c2 { -webkit-flex:1; flex:1; }
#col-hdr .c3 { width:120px; text-align:right; }

/* ETA list */
#eta-list { -webkit-flex:1; flex:1; display:-webkit-flex; display:flex; -webkit-flex-direction:column; flex-direction:column; gap:2px; padding:2px 0; overflow:hidden; }

.erow {
  display:-webkit-flex; display:flex;
  -webkit-align-items:center; align-items:center;
  padding:8px 14px; gap:8px;
  border-left:6px solid #333;
  -webkit-flex:1; flex:1; min-height:0;
}
.erow:nth-child(odd)  { background:#161616; }
.erow:nth-child(even) { background:#111111; }
.erow.arriving { border-left-color:var(--red); background:#1c0808; -webkit-animation:pr 1.4s infinite; animation:pr 1.4s infinite; }
.erow.soon     { border-left-color:var(--orange); background:#1a1000; }
.erow.normal   { border-left-color:var(--green); }
@-webkit-keyframes pr { 0%,100%{background:#1c0808} 50%{background:#2d0f0f} }
@keyframes pr { 0%,100%{background:#1c0808} 50%{background:#2d0f0f} }

.rnum { font-size:38px; font-weight:900; line-height:1; width:110px; -webkit-flex-shrink:0; flex-shrink:0; color:#fff; }
.dblock { -webkit-flex:1; flex:1; min-width:0; }
.dlabel { font-size:10px; color:var(--dim); text-transform:uppercase; }
.dzh { font-size:22px; font-weight:700; line-height:1.2; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.den { font-size:12px; color:#aaa; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.etabox { width:120px; text-align:right; -webkit-flex-shrink:0; flex-shrink:0; }
.emins { font-size:42px; font-weight:900; line-height:1; font-family:sans-serif; }
.eunit { font-size:11px; color:var(--dim); margin-top:2px; }
.arriving .emins { color:var(--red); }
.soon     .emins { color:var(--orange); }
.normal   .emins { color:var(--green); }
.noservice .emins { color:#555; font-size:20px; }

/* ── 右側天氣欄位 ── */
#weather-bar {
  background:var(--bg2); border-left:2px solid #222;
  -webkit-flex:1; flex:1;
  display:-webkit-flex; display:flex; 
  -webkit-flex-direction:column; flex-direction:column;
  -webkit-align-items:center; align-items:center;
  -webkit-justify-content:space-evenly; justify-content:space-evenly;
  padding:20px 15px; -webkit-flex-shrink:0; flex-shrink:0;
}

#w-main-info { 
  display:-webkit-flex; display:flex; 
  -webkit-flex-direction:column; flex-direction:column; 
  -webkit-align-items:center; align-items:center; 
  gap:12px; width:100%;
}
#w-icon { 
  font-size:110px; 
  line-height:1; display:block; text-align:center; 
}
#weather-temp { 
  font-size:68px; font-weight:900; color:#ffffff; 
  line-height:1; display:block; text-align:center; font-family:sans-serif;
}

/* 濕度與描述 */
#weather-humidity { color:#4dadf7; font-size:24px; font-weight:900; letter-spacing:1px; }
#weather-desc { color:#e0e0e0; font-size:18px; font-weight:700; text-align:center; line-height:1.6; padding:0 10px; max-height:110px; overflow:hidden; }

/* 天氣警告圖標容器 */
#warning-badges { 
  display:-webkit-flex; display:flex; 
  -webkit-flex-direction:row; flex-direction:row; 
  -webkit-flex-wrap:wrap; flex-wrap:wrap;
  -webkit-justify-content:center; justify-content:center;
  gap:10px; width:100%; -webkit-align-items:center; align-items:center; 
}
.warn-icon-img {
  height:50px; width:auto; display:block;
  -webkit-animation:blink 1.2s infinite; animation:blink 1.2s infinite;
}
.warn-badge {
  padding:6px 12px; border-radius:4px; font-weight:900; font-size:15px;
  -webkit-animation:blink 1.2s infinite; animation:blink 1.2s infinite;
}
.wT3  { background:#ffcc00; color:#000; }
.wT8  { background:#ff6600; color:#fff; }
.wT10 { background:#cc0000; color:#fff; }
.wRED   { background:#c00; color:#fff; }
.wBLACK { background:#000; color:#fff; border:2px solid #fff; }
.wAMBER { background:#e65c00; color:#fff; }
.wCOLD  { background:#1a6ee6; color:#fff; }
.wHEAT  { background:#c62828; color:#fff; }
@-webkit-keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

/* Status */
#statusbar {
  background:#080808; border-top:1px solid #222;
  font-size:11px; color:#666; padding:4px 14px;
  display:-webkit-flex; display:flex;
  -webkit-justify-content:space-between; justify-content:space-between;
  -webkit-flex-shrink:0; flex-shrink:0;
}

/* Ticker */
#ticker {
  background:var(--gold); color:#000; font-weight:900; font-size:14px;
  padding:6px 0; overflow:hidden; white-space:nowrap;
  -webkit-flex-shrink:0; flex-shrink:0;
}
#ticker-inner { display:inline-block; padding-left:100%; -webkit-animation:sc 30s linear infinite; animation:sc 30s linear infinite; }
@-webkit-keyframes sc { to { -webkit-transform:translateX(-100%); transform:translateX(-100%); } }
@keyframes sc { to { -webkit-transform:translateX(-100%); transform:translateX(-100%); } }

/* Loading */
#loading { position:fixed; inset:0; top:0; left:0; right:0; bottom:0; background:#0d0d0d; display:-webkit-flex; display:flex; -webkit-align-items:center; align-items:center; -webkit-justify-content:center; justify-content:center; z-index:99; -webkit-flex-direction:column; flex-direction:column; gap:16px; }
#loading-txt { color:#aaa; font-size:16px; font-weight:700; }
.spin { width:40px; height:40px; border:4px solid #222; border-top-color:var(--gold); border-radius:50%; -webkit-animation:sp .8s linear infinite; animation:sp .8s linear infinite; }
@-webkit-keyframes sp { to { -webkit-transform:rotate(360deg); transform:rotate(360deg); } }
@keyframes sp { to { -webkit-transform:rotate(360deg); transform:rotate(360deg); } }
</style>
</head>
<body>

<div id="loading">
  <div class="spin"></div>
  <div id="loading-txt">正在初始化系統…</div>
</div>

<div id="app">
  <div id="header">
    <div>
      <div id="stop-zh">衙前圍道</div>
      <div id="stop-en">Nga Tsin Wai Road</div>
    </div>
    <div>
      <div id="clock">--:--</div>
      <div id="dateline"></div>
    </div>
  </div>
  
  <div id="main-container">
    <div id="eta-container">
      <div id="col-hdr">
        <span class="c1">路線 Route</span>
        <span class="c2">目的地 Destination</span>
        <span class="c3">到站 ETA</span>
      </div>
      <div id="eta-list"></div>
    </div>
    
    <div id="weather-bar">
      <div id="w-main-info">
        <span id="w-icon">🌡️</span>
        <span id="weather-temp">--°C</span>
      </div>
      <div id="weather-humidity">💧 --%</div>
      <div id="weather-desc">正在獲取天氣資訊…</div>
      <div id="warning-badges"></div>
    </div>
  </div>

  <div id="statusbar">
    <span id="last-update">尚未更新</span>
    <span>系統自動維護 · KMB + HKO DATA</span>
  </div>
  <div id="ticker"><span id="ticker-inner">🚌 乘車時請緊握扶手 · 禮讓座位予有需要人士 · 衙前圍道 Nga Tsin Wai Road</span></div>
</div>

<script>
// 定義你需要的固定路線
var ROUTES = [
  { route:'11D', destZh:'樂富',       destEn:'Lok Fu'            },
  { route:'75X', destZh:'大埔(富善)', destEn:'Tai Po (Fu Shin)'  },
  { route:'85',  destZh:'火炭',       destEn:'Fo Tan'            },
  { route:'85A', destZh:'廣源',       destEn:'Kwong Yuen'        },
  { route:'1',   destZh:'尖沙咀',     destEn:'Tsim Sha Tsui'     }
];

// 直接鎖定「賈炳達道公園/啟德道」一側，位於衙前圍道的特定九巴站點 ID 組合
var stopIds = ["3529BA34A1BE33A7", "7209935E8E899496", "9976378A5BCEAF0B"]; 
var etaData = {};

// ── Clock ──
function updateClock() {
  var now = new Date();
  var hh = ('0'+now.getHours()).slice(-2);
  var mm = ('0'+now.getMinutes()).slice(-2);
  document.getElementById('clock').textContent = hh+':'+mm;
  var days=['日','一','二','三','四','五','六'];
  document.getElementById('dateline').textContent =
    now.getFullYear()+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日 ('+days[now.getDay()]+')';
}
setInterval(updateClock, 5000);
updateClock();

// ── XMLHttpRequest wrapper ──
function xhrGet(url, cb) {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.timeout = 10000;
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
      if (xhr.status === 200) {
        try { cb(null, JSON.parse(xhr.responseText)); }
        catch(e) { cb(e); }
      } else {
        cb(new Error('HTTP '+xhr.status));
      }
    }
  };
  xhr.ontimeout = function() { cb(new Error('timeout')); };
  xhr.onerror   = function() { cb(new Error('network')); };
  xhr.send();
}

// ── 自動比對並動態補全該站其餘正確 Stop ID ──
function initStopIds(done) {
  document.getElementById('loading-txt').textContent = '正在定位巴士站點…';
  xhrGet('https://data.etabus.gov.hk/v1/transport/kmb/stop', function(err, json) {
    if (!err && json && json.data) {
      var found = [];
      var data = json.data || [];
      for (var i=0; i<data.length; i++) {
        var s = data[i];
        if (s.name_tc && s.name_tc.indexOf('衙前圍道') !== -1) {
          var lat = parseFloat(s.lat);
          var lng = parseFloat(s.long);
          if (lat > 22.328 && lat < 22.331 && lng > 114.186 && lng < 114.192) {
            if (found.indexOf(s.stop) === -1) {
              found.push(s.stop);
            }
          }
        }
      }
      if (found.length > 0) {
        stopIds = found;
      }
    }
    done();
  });
}

// ── Fetch ETA ──
function fetchETA(done) {
  if (!stopIds.length) { if(done) done(); return; }
  var now = new Date();
  var newEta = {};
  for (var i=0; i<ROUTES.length; i++) newEta[ROUTES[i].route] = [];

  var remaining = stopIds.length;
  function finish() {
    remaining--;
    if (remaining <= 0) {
      for (var r in newEta) {
        var arr = newEta[r];
        arr.sort(function(a,b){return a-b;});
        var uniq = [];
        for (var j=0; j<arr.length; j++) {
          if (uniq.indexOf(arr[j]) === -1 && arr[j] >= -1) uniq.push(arr[j]);
        }
        newEta[r] = uniq.slice(0,3);
      }
      etaData = newEta;
      renderETA();
      var ts = new Date();
      var hh=('0'+ts.getHours()).slice(-2), mm=('0'+ts.getMinutes()).slice(-2), ss=('0'+ts.getSeconds()).slice(-2);
      document.getElementById('last-update').textContent = '最後更新：'+hh+':'+mm+':'+ss;
      if (done) done();
    }
  }

  for (var s=0; s<stopIds.length; s++) {
    (function(sid) {
      xhrGet('https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/'+sid, function(err, json) {
        if (!err && json && json.data) {
          for (var k=0; k<json.data.length; k++) {
            var item = json.data[k];
            var wanted = null;
            for (var r=0; r<ROUTES.length; r++) {
              if (ROUTES[r].route === item.route) { wanted = ROUTES[r]; break; }
            }
            if (!wanted || !item.eta) continue;
            var diffMs = new Date(item.eta) - now;
            var mins = Math.floor(diffMs / 60000); 
            if (mins >= -1 && mins <= 90) newEta[item.route].push(mins);
          }
        }
        finish();
      });
    })(stopIds[s]);
  }
}

// ── Render ETA ──
function renderETA() {
  var list = document.getElementById('eta-list');
  list.innerHTML = '';
  for (var i=0; i<ROUTES.length; i++) {
    var cfg = ROUTES[i];
    var mins = etaData[cfg.route] || [];
    var first = mins.length ? mins[0] : null;
    var cls = 'noservice';
    if (first !== null) {
      if (first <= 1) cls = 'arriving';
      else if (first <= 4) cls = 'soon';
      else cls = 'normal';
    }
    var minsDisplay = first === null ? '–' : (first <= 0 ? '▶' : first);
    var unitDisplay = first === null ? '暫無班次' : (first <= 0 ? '即將抵達' : '分鐘');
    
    var nextArr = mins.slice(1);
    var nextHint = '';
    for (var j=0; j<nextArr.length; j++) {
      var mVal = nextArr[j];
      nextHint += (j?' / ':'') + (mVal <= 0 ? '即將抵達' : mVal+'分');
    }

    var row = document.createElement('div');
    row.className = 'erow '+cls;
    row.innerHTML =
      '<div class="rnum">'+cfg.route+'</div>'+
      '<div class="dblock">'+
        '<div class="dlabel">往 To</div>'+
        '<div class="dzh">'+cfg.destZh+'</div>'+
        '<div class="den">'+cfg.destEn+(nextHint?' <span style="color:#888;font-size:0.9em;margin-left:5px;">('+nextHint+')</span>':'')+'</div>'+
      '</div>'+
      '<div class="etabox">'+
        '<div class="emins">'+minsDisplay+'</div>'+
        '<div class="eunit">'+unitDisplay+'</div>'+
      '</div>';
    list.appendChild(row);
  }
}

// ── 天氣對應配置 (已更新為香港天文台 API 官方代碼) ──
var WARN_LABEL = {
  'TC1':'一號戒備','TC3':'三號風球','TC8NE':'八號東北','TC8SE':'八號東南',
  'TC8NW':'八號西北','TC8SW':'八號西南','TC9':'九號風球','TC10':'十號颶風',
  'WRAINA':'黃色暴雨','WRAINR':'紅色暴雨','WRAINB':'黑色暴雨',
  'WCOLD':'寒冷天氣','WHOT':'酷熱天氣','WFROST':'霜凍',
  'WTS':'雷暴警告','WMSGNL':'強烈季候風',
  'WFIREY':'黃色火災危險','WFIRED':'紅色火災危險'
};

var WARN_ICON = {
  'TC1': 'https://www.hko.gov.hk/common/images/warning_icons/tc1.gif',
  'TC3': 'https://www.hko.gov.hk/common/images/warning_icons/tc3.gif',
  'TC8NE': 'https://www.hko.gov.hk/common/images/warning_icons/tc8ne.gif',
  'TC8SE': 'https://www.hko.gov.hk/common/images/warning_icons/tc8se.gif',
  'TC8NW': 'https://www.hko.gov.hk/common/images/warning_icons/tc8nw.gif',
  'TC8SW': 'https://www.hko.gov.hk/common/images/warning_icons/tc8sw.gif',
  'TC9': 'https://www.hko.gov.hk/common/images/warning_icons/tc9.gif',
  'TC10': 'https://www.hko.gov.hk/common/images/warning_icons/tc10.gif',
  'WRAINA': 'https://www.hko.gov.hk/common/images/warning_icons/rain_amber.gif',
  'WRAINR': 'https://www.hko.gov.hk/common/images/warning_icons/rain_red.gif',
  'WRAINB': 'https://www.hko.gov.hk/common/images/warning_icons/rain_black.gif',
  'WCOLD': 'https://www.hko.gov.hk/common/images/warning_icons/cold.gif',
  'WHOT': 'https://www.hko.gov.hk/common/images/warning_icons/vhot.gif',
  'WFROST': 'https://www.hko.gov.hk/common/images/warning_icons/frost.gif',
  'WTS': 'https://www.hko.gov.hk/common/images/warning_icons/ts.gif',
  'WMSGNL': 'https://www.hko.gov.hk/common/images/warning_icons/sms.gif',
  'WFIREY': 'https://www.hko.gov.hk/common/images/warning_icons/firey.gif',
  'WFIRED': 'https://www.hko.gov.hk/common/images/warning_icons/firer.gif'
};

var WARN_CSS = {
  'TC3':'wT3','TC8NE':'wT8','TC8SE':'wT8','TC8NW':'wT8','TC8SW':'wT8','TC9':'wT8','TC10':'wT10',
  'WRAINA':'wAMBER','WRAINR':'wRED','WRAINB':'wBLACK',
  'WCOLD':'wCOLD','WHOT':'wHEAT','WFROST':'wCOLD',
  'WFIREY':'wAMBER','WFIRED':'wRED'
};

var ICONS = {50:'☀️',51:'🌤️',52:'🌤️',53:'⛅',54:'🌧️',60:'🌧️',61:'⛈️',62:'⛈️',63:'🌩️',64:'🌩️',65:'🌧️',70:'☁️',71:'☁️',76:'🌫️',80:'🌦️',85:'⛈️',90:'🌡️'};

function fetchWeather() {
  // 獲取即時天氣資料 (溫度/濕度/天氣描述)
  xhrGet('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc', function(err, obs) {
    if (!err && obs) {
      var temp='--', humid='--';
      var tArr = obs.temperature && obs.temperature.data || [];
      for(var i=0; i<tArr.length; i++){ if(tArr[i].place==='九龍城'){ temp=Math.round(tArr[i].value); break; } }
      if(temp==='--' && tArr.length) temp=Math.round(tArr[0].value);
      
      var hArr = obs.humidity && obs.humidity.data || [];
      for(var j=0; j<hArr.length; j++){ if(hArr[j].place==='九龍城'){ humid=hArr[j].value; break; } }
      if(humid==='--' && hArr.length) humid=hArr[0].value;
      
      var icon = obs.icon && obs.icon[0] ? (ICONS[obs.icon[0]]||'🌡️') : '🌡️';
      var desc = obs.text ? obs.text.substring(0,60) : '';
      
      document.getElementById('w-icon').textContent = icon;
      document.getElementById('weather-temp').textContent = temp+'°C';
      document.getElementById('weather-desc').textContent = desc;
      document.getElementById('weather-humidity').textContent = '💧 '+humid+'%';
    }
  });
  
  // 獲取現正生效天氣警告 (使用 actionCode 判斷)
  xhrGet('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=tc', function(err, warn) {
    var badges = document.getElementById('warning-badges');
    badges.innerHTML = '';
    var tickerWarns = [];
    
    if (!err && warn) {
      for (var code in warn) {
        var warnItem = warn[code];
        // 確保警告現正生效
        if (warnItem && warnItem.actionCode === 'ISSUE') {
          var label = WARN_LABEL[code] || warnItem.name || code;
          var iconUrl = WARN_ICON[code];
          
          if (iconUrl) {
            var img = document.createElement('img');
            img.className = 'warn-icon-img';
            img.src = iconUrl;
            img.alt = label;
            badges.appendChild(img);
          } else {
            var css = WARN_CSS[code] || 'wT3';
            var b = document.createElement('span');
            b.className = 'warn-badge ' + css;
            b.textContent = label;
            badges.appendChild(b);
          }
          tickerWarns.push(label);
        }
      }
    }
    
    var tickerInner = document.getElementById('ticker-inner');
    if (tickerWarns.length) {
      tickerInner.textContent = '⚠️ 天文台現正生效：' + tickerWarns.join(' ｜ ') + ' ｜ 🚌 排隊候車，先落後上 ｜ 請緊握扶手';
    } else {
      tickerInner.textContent = '🚌 排隊候車，先落後上 ｜ 乘車時請緊握扶手，確保安全 ｜ 衙前圍道 Nga Tsin Wai Road';
    }
  });
}

// ── 啟動初始化 ──
initStopIds(function() {
  document.getElementById('loading-txt').textContent = '正在獲取即時到站時間…';
  fetchETA(function() {
    fetchWeather();
    // 關閉 Loading 畫面，顯示主程式
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').className = 'show';
    
    // 設定定時輪詢
    setInterval(fetchETA, 30000);     // 巴士到站時間每 30 秒更新一次
    setInterval(fetchWeather, 120000); // 天氣資訊每 2 分鐘更新一次
  });
});
</script>
</body>
</html>
