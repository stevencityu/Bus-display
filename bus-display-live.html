<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>巴士資訊牌</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d0d0d; color:#f0f0f0; font-family:'Helvetica Neue', sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
    #header { padding:20px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center; }
    #main { display:flex; flex:1; overflow:hidden; }
    #eta-list { flex:2; border-right:1px solid #333; overflow-y:auto; }
    .erow { display:flex; align-items:center; padding:15px 20px; border-bottom:1px solid #222; }
    .rnum { width:100px; font-weight:bold; font-size:32px; color:#c8a400; }
    .rinfo { flex:1; }
    .eta { font-size:24px; color:#43a047; font-weight:bold; }
    #weather-side { flex:1; display:flex; flex-direction:column; align-items:center; padding:20px; text-align:center; }
    #warning-container { display:flex; gap:5px; margin-top:10px; }
</style>
</head>
<body>

<div id="header">
    <div><h1>衙前圍道 / 太子道西</h1><p>Nga Tsin Wai Rd / Prince Edward Rd W</p></div>
    <div id="clock" style="font-size:48px; font-weight:bold;">--:--</div>
</div>

<div id="main">
    <div id="eta-list"></div>
    <div id="weather-side">
        <img id="w-icon" style="width:100px;">
        <div id="temp" style="font-size:48px;">--°C</div>
        <div id="humidity" style="color:#4dadf7;">--%</div>
        <div id="warning-container"></div>
    </div>
</div>

<script>
// 設定所有想看的路線，這裡不用分開兩個 ID，直接用一個大清單去過濾
const ALLOWED_ROUTES = ['11D', '75X', '85', '85A', '1'];
const STOP_IDS = ["84ECCB274C4677E8", "DB581AD59964EA41"];

async function update() {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('zh-HK', {hour:'2-digit', minute:'2-digit', hour12:false});
    
    // 抓取所有站點資料
    let allData = [];
    for (const sid of STOP_IDS) {
        try {
            const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${sid}`);
            const json = await res.json();
            if (json.data) allData.push(...json.data);
        } catch(e) {}
    }

    // 過濾、去重 (只留該路線最近的一班)、排序
    const list = document.getElementById('eta-list');
    list.innerHTML = '';
    const now = new Date();
    
    // 只取指定路線，並且用 route 作為 key 去重
    const filtered = allData.filter(i => ALLOWED_ROUTES.includes(i.route));
    const finalData = [];
    ALLOWED_ROUTES.forEach(r => {
        const bus = filtered.filter(i => i.route === r && i.eta).sort((a,b) => new Date(a.eta) - new Date(b.eta))[0];
        if(bus) finalData.push(bus);
    });

    finalData.forEach(item => {
        const mins = Math.max(0, Math.round((new Date(item.eta) - now) / 60000));
        const div = document.createElement('div');
        div.className = 'erow';
        div.innerHTML = `<div class="rnum">${item.route}</div><div class="rinfo">${item.dest_tc}</div><div class="eta">${mins} 分鐘</div>`;
        list.appendChild(div);
    });

    // 天氣
    try {
        const res = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc');
        const data = await res.json();
        document.getElementById('temp').textContent = data.temperature.data.find(i => i.place === '九龍城').value + '°C';
        document.getElementById('w-icon').src = `https://www.hko.gov.hk/images/HKOWxIconOutline/pic${data.icon[0]}.png`;
        
        // 警告
        const resW = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=tc');
        const warn = await resW.json();
        const container = document.getElementById('warning-container');
        container.innerHTML = '';
        Object.keys(warn).forEach(k => {
            if(warn[k].actionCode === 'ISSUE') {
                container.innerHTML += `<img src="https://www.hko.gov.hk/tc/textonly/img/warn/images/${k.toLowerCase()}.gif" style="height:30px;">`;
            }
        });
    } catch(e) {}
}

update();
setInterval(update, 30000);
</script>
</body>
</html>
