<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>衙前圍道 - 即時資訊牌</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root { --gold: #c8a400; --bg: #0d0d0d; --bg2: #161616; --txt: #ffffff; --green: #43a047; --alert: #ff5252; }
    body { background: var(--bg); color: var(--txt); font-family: 'Helvetica Neue', Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    
    /* 頂部 Header */
    #header { background: var(--bg2); border-bottom: 3px solid var(--gold); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    #clock { font-size: 50px; font-weight: bold; font-family: monospace; }
    
    /* 中間主體內容 */
    #main-container { display: flex; flex: 1; min-height: 0; }
    #eta-section { flex: 2; border-right: 2px solid #333; overflow-y: auto; }
    #weather-section { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    
    /* 巴士列表樣式 */
    .bus-row { display: flex; align-items: center; padding: 15px 20px; border-bottom: 1px solid #333; }
    .rnum { width: 100px; font-size: 32px; font-weight: 900; color: var(--gold); }
    .rdest { flex: 1; font-size: 20px; }
    .eta-group { text-align: right; }
    .eta-main { font-size: 36px; color: var(--green); font-weight: bold; }
    .eta-sub { font-size: 16px; color: #888; margin-top: 2px; }

    /* 即將到站特效 */
    .arriving { color: var(--alert); animation: blink 1.2s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* 天氣樣式 */
    #humidity { font-size: 24px; color: #4dadf7; margin-top: 5px; font-weight: bold; }
    #warning-badges { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; justify-content: center; }
    .warn-icon { height: 50px; }

    /* 底部走馬燈 */
    #ticker { background: var(--gold); color: #000; font-size: 20px; font-weight: 900; padding: 12px 0; overflow: hidden; white-space: nowrap; flex-shrink: 0; }
    #ticker-inner { display: inline-block; padding-left: 100%; animation: scroll 25s linear infinite; }
    @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
</style>
</head>
<body>

<div id="header">
    <div><h1>衙前圍道</h1><p style="color:#888;">Nga Tsin Wai Road</p></div>
    <div id="clock">--:--</div>
</div>

<div id="main-container">
    <div id="eta-section">
        <div id="eta-list"></div>
    </div>
    <div id="weather-section">
        <div id="w-icon"></div>
        <div id="temp" style="font-size: 60px; font-weight: 900;">--°C</div>
        <div id="humidity">💧 --%</div>
        <div id="warning-badges"></div>
    </div>
</div>

<div id="ticker">
    <div id="ticker-inner">正在獲取最新天氣與巴士資訊...</div>
</div>
