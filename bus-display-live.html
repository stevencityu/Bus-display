<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>巴士資訊牌</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d0d0d; color:#f0f0f0; font-family:'Helvetica Neue', sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
    
    /* Header */
    #header { padding:20px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center; }
    .title-area h1 { font-size:28px; }
    .title-area p { color:#888; font-size:14px; }
    #clock-area { text-align:right; }
    #clock { font-size:48px; font-weight:bold; }
    #date { color:#888; }

    /* Main Container */
    #main { display:flex; flex:1; overflow:hidden; }
    #eta-list { flex:2; border-right:1px solid #333; overflow-y:auto; padding:10px 0; }
    #weather-side { flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; gap:20px; }

    /* Row Style */
    .erow { display:flex; align-items:center; padding:15px 20px; border-bottom:1px solid #222; }
    .rnum { width:100px; font-weight:bold; font-size:32px; color:#c8a400; }
    .rinfo { flex:1; }
    .rinfo div:first-child { font-size:22px; font-weight:bold; }
    .rinfo div:last-child { font-size:14px; color:#888; }
    .eta { font-size:24px; color:#43a047; }

    /* Weather Style */
    #w-icon { width:150px; }
    #temp { font-size:72px; font-weight:bold; }
    #humidity { color:#4dadf7; font-size:24px; }

    /* Footer */
    #footer { padding:5px 20px; font-size:12px; color:#555; display:flex; justify-content:space-between; }
</style>
</head>
<body>

<div id="header">
    <div class="title-area">
        <h1>衙前圍道</h1>
        <p>Nga Tsin Wai Road</p>
    </div>
    <div id="clock-area">
        <div id="clock">--:--</div>
        <div id="date">--</div>
    </div>
</div>

<div id="main">
    <div id="eta-list"></div>
    <div id="weather-side">
        <img id="w-icon" src="" alt="weather">
        <div id="temp">--°C</div>
        <div id="humidity">--%</div>
        <div id="w-desc">讀取中...</div>
    </div>
</div>

<div id="footer">
    <div id="last-update">最後更新：--:--</div>
    <div>系統自動維護 · KMB + HKO DATA</div>
</div>

<script>
// 設定對應的路線名稱 (配合你的 ID)
const stopMapping = {
    "84ECCB274C4677E8": ["11D", "75X", "85", "85A"],
    "DB581AD59964EA41": ["1"]
};

async function update() {
    // 1. 更新時鐘
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString('zh-HK', {hour:'2-digit', minute:'2-digit', hour12:false});
    document.getElementById('date').textContent = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 (${['日','一','二','三','四','五','六'][now.getDay()]})`;

    // 2. 更新巴士列表
    const list = document.getElementById('eta-list');
    list.innerHTML = '';
    
    for (const [sid, routes] of Object.entries(stopMapping)) {
        try {
            const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${sid}`);
            const json = await res.json();
            if(json.data) {
                json.data.filter(i => routes.includes(i.route)).forEach(item => {
                    const mins = Math.round((new Date(item.eta) - now) / 60000);
                    const div = document.createElement('div');
                    div.className = 'erow';
                    div.innerHTML = `
                        <div class="rnum">${item.route}</div>
                        <div class="rinfo"><div>${item.dest_tc}</div><div>${item.dest_en}</div></div>
                        <div class="eta">${mins > 0 ? mins + ' 分鐘' : '即將抵達'}</div>
                    `;
                    list.appendChild(div);
                });
            }
        } catch(e) { console.error(e); }
    }

    // 3. 更新天氣
    try {
        const res = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc');
        const data = await res.json();
        const temp = data.temperature.data.find(i => i.place === '九龍城').value;
        const hum = data.humidity.data.find(i => i.place === '香港天文台').value;
        document.getElementById('temp').textContent = temp + '°C';
        document.getElementById('humidity').textContent = '💧 ' + hum + '%';
        document.getElementById('w-desc').textContent = data.forecastDesc;
        document.getElementById('w-icon').src = `https://www.hko.gov.hk/images/HKOWxIconOutline/pic${data.icon[0]}.png`;
    } catch(e) { document.getElementById('w-desc').textContent = "無法連線至天文台"; }
    
    document.getElementById('last-update').textContent = '最後更新：' + new Date().toLocaleTimeString('zh-HK', {hour12:false});
}

update();
setInterval(update, 30000);
</script>
</body>
</html>
