<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>巴士站 - 電子資訊牌</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { --gold:#c8a400; --bg:#0d0d0d; --txt:#f0f0f0; }
body { background:var(--bg); color:var(--txt); font-family:sans-serif; height:100vh; display:flex; flex-direction:column; }
#header { background:#161616; border-bottom:3px solid var(--gold); padding:15px; }
#eta-list { flex:1; overflow-y:auto; padding:10px; }
.erow { display:flex; align-items:center; padding:12px; border-bottom:1px solid #333; }
.rnum { width:100px; font-weight:900; font-size:30px; color:var(--gold); }
.etabox { flex:1; text-align:right; font-size:24px; color:#43a047; }
</style>
</head>
<body>

<div id="header">
    <h1>巴士資訊站</h1>
    <div id="clock">--:--</div>
</div>
<div id="eta-list">讀取中...</div>

<script>
// 你現在擁有兩個正確的 ID
const stopIds = ["84ECCB274C4677E8", "DB581AD59964EA41"];

async function update() {
    const list = document.getElementById('eta-list');
    list.innerHTML = '';
    const now = new Date();

    for (const sid of stopIds) {
        try {
            const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${sid}`);
            const json = await res.json();
            
            if (json.data) {
                json.data.forEach(item => {
                    const row = document.createElement('div');
                    row.className = 'erow';
                    const mins = Math.round((new Date(item.eta) - now) / 60000);
                    row.innerHTML = `
                        <div class="rnum">${item.route}</div>
                        <div class="etabox">${mins > 0 ? mins + ' 分鐘' : '即將抵達'}</div>
                    `;
                    list.appendChild(row);
                });
            }
        } catch (e) {
            console.error("抓取失敗", e);
        }
    }
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('zh-HK', {hour:'2-digit', minute:'2-digit'});
}

update();
setInterval(update, 30000);
</script>
</body>
</html>
