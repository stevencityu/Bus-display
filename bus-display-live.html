<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>衙前圍道巴士站</title>
<style>
/* 簡潔的 CSS，確保在舊設備上流暢運行 */
body { background:#0d0d0d; color:#fff; font-family:sans-serif; margin:0; }
#app { padding:20px; }
.row { display:flex; padding:15px; border-bottom:1px solid #333; align-items:center; }
.route { width:100px; font-size:30px; font-weight:bold; }
.eta { flex:1; text-align:right; font-size:30px; color:#c8a400; }
#status-msg { font-size:12px; color:#666; margin-top:20px; }
</style>
</head>
<body>
<div id="app">
  <h2 id="clock">--:--</h2>
  <div id="eta-list">正在連接數據伺服器...</div>
  <div id="status-msg"></div>
</div>

<script>
// 1. 強制加入隨機數，防止 iOS 瀏覽器讀取舊的緩存數據
function getLatest(url) {
    return url + (url.indexOf('?') === -1 ? '?' : '&') + 't=' + new Date().getTime();
}

function updateData() {
    document.getElementById('status-msg').textContent = "更新中...";
    
    // 這裡我們只抓取關鍵的 ETA API
    fetch(getLatest('https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/002685')) // 假設這是你的站點ID
    .then(r => r.json())
    .then(data => {
        const list = document.getElementById('eta-list');
        list.innerHTML = ""; // 清空舊資料
        
        // 簡單顯示邏輯
        data.data.slice(0, 5).forEach(item => {
            const row = document.createElement('div');
            row.className = 'row';
            row.innerHTML = `<div class="route">${item.route}</div><div class="eta">${item.eta ? Math.round((new Date(item.eta) - new Date())/60000) + ' 分鐘' : '即將抵達'}</div>`;
            list.appendChild(row);
        });
        document.getElementById('status-msg').textContent = "更新完成: " + new Date().toLocaleTimeString();
    })
    .catch(e => {
        document.getElementById('status-msg').textContent = "連接失敗，正在重試...";
        setTimeout(updateData, 10000); // 失敗後 10 秒重試
    });
}

// 時鐘
setInterval(() => {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('zh-HK', {hour12:false, hour:'2-digit', minute:'2-digit'});
}, 1000);

// 初始化
updateData();
setInterval(updateData, 60000); // 每分鐘刷新
</script>
</body>
</html>
