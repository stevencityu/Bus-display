<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<title>巴士資訊牌</title>
<style>
    body { background:#0d0d0d; color:#fff; font-family:sans-serif; margin:0; overflow:hidden; }
    #app { display:flex; height:100vh; }
    #left { flex:2; padding:20px; border-right:1px solid #333; }
    #right { flex:1; padding:20px; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .row { display:flex; align-items:center; padding:15px; border-bottom:1px solid #222; }
    .route { width:100px; font-size:30px; font-weight:bold; color:#c8a400; }
    .eta { font-size:24px; color:#43a047; }
</style>
</head>
<body>
<div id="app">
    <div id="left"><div id="eta-list">正在重新連結數據...</div></div>
    <div id="right">
        <img id="w-icon" style="width:100px;">
        <div id="temp" style="font-size:50px;">--°C</div>
        <div id="warning-container"></div>
    </div>
</div>

<script>
const STOP_IDS = ["84ECCB274C4677E8", "DB581AD59964EA41", "95A03A5E58916EA3"];
const ALLOWED = ['11D', '75X', '85', '85A', '1'];

async function refresh() {
    // 1. 抓巴士資料
    const list = document.getElementById('eta-list');
    let allData = [];
    for(const id of STOP_IDS) {
        try {
            const r = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${id}`);
            const d = await r.json();
            if(d.data) allData.push(...d.data);
        } catch(e) {}
    }
    
    list.innerHTML = '';
    ALLOWED.forEach(r => {
        const bus = allData.filter(i => i.route === r).sort((a,b) => new Date(a.eta) - new Date(b.eta))[0];
        if(bus) {
            const m = Math.max(0, Math.round((new Date(bus.eta) - new Date()) / 60000));
            list.innerHTML += `<div class="row"><div class="route">${r}</div><div>${bus.dest_tc}</div><div class="eta" style="margin-left:auto">${m} 分鐘</div></div>`;
        }
    });

    // 2. 抓天氣
    try {
        const tr = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc');
        const td = await tr.json();
        document.getElementById('temp').textContent = td.temperature.data.find(i=>i.place==='九龍城').value + '°C';
        document.getElementById('w-icon').src = `https://www.hko.gov.hk/images/HKOWxIconOutline/pic${td.icon[0]}.png`;
        
        const wr = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=tc');
        const wd = await wr.json();
        const wc = document.getElementById('warning-container');
        wc.innerHTML = '';
        Object.keys(wd).forEach(k => {
            if(wd[k].actionCode === 'ISSUE') wc.innerHTML += `<img src="https://www.hko.gov.hk/tc/textonly/img/warn/images/${k.toLowerCase()}.gif" height="30">`;
        });
    } catch(e) {}
}

refresh();
setInterval(refresh, 60000);
</script>
</body>
</html>
