<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>巴士資訊牌</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root { --gold:#c8a400; --bg:#0d0d0d; --txt:#f0f0f0; }
    body { background:var(--bg); color:var(--txt); font-family:sans-serif; height:100vh; display:flex; flex-direction:column; }
    #header { background:#161616; border-bottom:3px solid var(--gold); padding:15px; display:flex; justify-content:space-between; align-items:center; }
    #eta-list { flex:1; overflow-y:auto; padding:10px; }
    .erow { display:flex; align-items:center; padding:12px; border-bottom:1px solid #333; }
    .rnum { width:100px; font-weight:900; font-size:30px; color:var(--gold); }
    .etabox { flex:1; text-align:right; font-size:24px; color:#43a047; }
    #weather-bar { background:#161616; padding:15px; border-top:2px solid #333; text-align:center; }
</style>
</head>
<body>

<div id="header">
    <h1>巴士資訊</h1>
    <div id="clock">--:--</div>
</div>
<div id="eta-list">讀取中...</div>
<div id="weather-bar">
    <div id="weather-temp">--°C</div>
    <div id="weather-desc">讀取中...</div>
</div>

<script>
// 1. 設定你監控的站點
const stopIds = ["84ECCB274C4677E8", "DB581AD59964EA41"];
// 2. 指定你只想看到的路線
const allowedRoutes = ['11D', '75X', '85', '85A', '1'];

async function updateAll() {
    // 更新時間
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('zh-HK', {hour:'2-digit', minute:'2-digit'});
    
    // 更新巴士
    const list = document.getElementById('eta-list');
    list.innerHTML = '';
    const now = new Date();

    for (const sid of stopIds) {
        try {
            const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${sid}`);
            const json = await res.json();
            if (json.data) {
                // 過濾路線：只顯示在 allowedRoutes 清單內的
                json.data.filter(i => allowedRoutes.includes(i.route)).forEach(item => {
                    const row = document.createElement('div');
                    row.className = 'erow';
                    const mins = Math.round((new Date(item.eta) - now) / 60000);
                    row.innerHTML = `<div class="rnum">${item.route}</div><div class="etabox">${mins > 0 ? mins + ' 分鐘' : '即將抵達'}</div>`;
                    list.appendChild(row);
                });
            }
        } catch (e) { console.error(e); }
    }

    // 更新天氣
    try {
        const res = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc');
        const data = await res.json();
        const temp = data.temperature.data.find(i => i.place === '九龍城').value;
        document.getElementById('weather-temp').textContent = temp + '°C';
        document.getElementById('weather-desc').textContent = data.forecastDesc;
    } catch (e) {
        document.getElementById('weather-desc').textContent = "天氣資料讀取失敗";
    }
}

updateAll();
setInterval(updateAll, 30000);
</script>
</body>
</html>
