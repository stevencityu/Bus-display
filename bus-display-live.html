<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>衙前圍道巴士站</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { --gold:#c8a400; --bg:#0d0d0d; --bg2:#161616; --txt:#f0f0f0; --dim:#888; }
body { background:var(--bg); color:var(--txt); font-family:sans-serif; height:100vh; overflow:hidden; display:flex; flex-direction:column; }
#app { display:flex; flex-direction:column; height:100%; }
#header { background:var(--bg2); border-bottom:3px solid var(--gold); padding:10px 20px; display:flex; justify-content:space-between; align-items:center; }
#main-container { flex:1; display:flex; min-height:0; }
#eta-container { width:50%; border-right:1px solid #333; overflow-y:auto; }
#weather-bar { width:50%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:15px; }
#weather-temp { font-size:48px; font-weight:900; }
#warning-badges { display:flex; flex-wrap:wrap; justify-content:center; gap:10px; }
.warn-icon-img { height:60px; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div><div style="font-size:24px; font-weight:900;">衙前圍道</div><div style="color:var(--dim);">Nga Tsin Wai Road</div></div>
    <div id="clock" style="font-size:32px; font-weight:900;">--:--</div>
  </div>
  <div id="main-container">
    <div id="eta-container"><div id="eta-list" style="padding:10px;">正在載入巴士資訊...</div></div>
    <div id="weather-bar">
      <div id="weather-temp">--°C</div>
      <div id="weather-desc">載入中...</div>
      <div id="warning-badges"></div>
    </div>
  </div>
</div>

<script>
// 1. 天文台警告圖標對照表 (確保所有代碼都能找到對應圖片)
const ICON_MAP = {
  'WTS': 'https://www.hko.gov.hk/common/images/warning_icons/ts.gif',
  'WRAIN_A': 'https://www.hko.gov.hk/common/images/warning_icons/rain_amber.gif',
  'WRAIN_R': 'https://www.hko.gov.hk/common/images/warning_icons/rain_red.gif',
  'WRAIN_B': 'https://www.hko.gov.hk/common/images/warning_icons/rain_black.gif',
  'WTC1': 'https://www.hko.gov.hk/common/images/warning_icons/tc1.gif',
  'WTC3': 'https://www.hko.gov.hk/common/images/warning_icons/tc3.gif',
  'WTC8NE': 'https://www.hko.gov.hk/common/images/warning_icons/tc8ne.gif',
  'WTC8SE': 'https://www.hko.gov.hk/common/images/warning_icons/tc8se.gif',
  'WTC8NW': 'https://www.hko.gov.hk/common/images/warning_icons/tc8nw.gif',
  'WTC8SW': 'https://www.hko.gov.hk/common/images/warning_icons/tc8sw.gif',
  'WHOT': 'https://www.hko.gov.hk/common/images/warning_icons/vhot.gif',
  'WCOLD': 'https://www.hko.gov.hk/common/images/warning_icons/cold.gif'
};

function updateData() {
  // 更新時間
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('zh-HK', {hour:'2-digit', minute:'2-digit'});

  // 更新天氣
  fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc')
    .then(r => r.json())
    .then(data => {
      document.getElementById('weather-temp').textContent = (data.temperature?.data[0]?.value || '--') + '°C';
      document.getElementById('weather-desc').textContent = data.forecastDesc || '';
    });

  // 更新警告 (核心邏輯)
  fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=tc')
    .then(r => r.json())
    .then(warn => {
      const container = document.getElementById('warning-badges');
      container.innerHTML = '';
      for (let code in warn) {
        // 修正後的邏輯：只要不是 CANCEL 就顯示
        if (warn[code].actionCode !== 'CANCEL' && ICON_MAP[code]) {
          let img = document.createElement('img');
          img.className = 'warn-icon-img';
          img.src = ICON_MAP[code];
          container.appendChild(img);
        }
      }
    });
}

setInterval(updateData, 60000);
updateData();
</script>
</body>
</html>
