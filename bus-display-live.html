<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>衙前圍道巴士站 - 電子資訊牌</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --gold:#c8a400; --red:#e53935; --orange:#fb8c00; --green:#43a047;
  --bg:#0d0d0d; --bg2:#161616; --txt:#f0f0f0; --dim:#888;
}
html,body { height:100%; background:var(--bg); color:var(--txt); font-family:'Arial Black','Arial','Microsoft JhengHei',sans-serif; overflow:hidden; }
#app { display:flex; flex-direction:column; height:100vh; }

/* Header */
#header {
  background:var(--bg2); border-bottom:3px solid var(--gold);
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 18px; flex-shrink:0;
}
#stop-zh { font-size:28px; font-weight:900; letter-spacing:1px; }
#stop-en { font-size:13px; color:var(--dim); margin-top:2px; }
#clock { font-size:54px; font-weight:900; letter-spacing:2px; line-height:1; font-family: monospace; }
#dateline { font-size:12px; color:var(--dim); text-align:right; margin-top:4px; }

/* 主體左右分欄 */
#main-container { flex:1; display:flex; min-height:0; overflow:hidden; }

/* 固定巴士板 */
#eta-container { width: 560px; flex-shrink: 0; display:flex; flex-direction:column; min-height:0; }
#col-hdr { display:flex; background:var(--gold); color:#000; font-weight:900; font-size:14px; padding:6px 14px; flex-shrink:0; }
#col-hdr .c1 { width:110px; }
#col-hdr .c2 { flex:1; }
#col-hdr .c3 { width:120px; text-align:right; }
#eta-list { flex:1; display:flex; flex-direction:column; gap:2px; padding:2px 0; overflow-y:auto; }

.erow { display:flex; align-items:center; padding:8px 14px; gap:8px; border-left:6px solid #333; flex:1; min-height:0; }
.erow:nth-child(odd)  { background:#161616; }
.erow:nth-child(even) { background:#111111; }
.erow.arriving { border-left-color:var(--red); background:#1c0808; animation:pr 1.4s infinite; }
.erow.soon     { border-left-color:var(--orange); background:#1a1000; }
.erow.normal   { border-left-color:var(--green); }
@keyframes pr { 0%,100%{background:#1c0808} 50%{background:#2d0f0f} }

.rnum { font-size:38px; font-weight:900; line-height:1; width:110px; flex-shrink:0; color:#fff; }
.dblock { flex:1; min-width:0; }
.dlabel { font-size:10px; color:var(--dim); text-transform:uppercase; }
.dzh { font-size:22px; font-weight:700; line-height:1.2; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.den { font-size:12px; color:#aaa; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.etabox { width:120px; text-align:right; flex-shrink:0; }
.emins { font-size:42px; font-weight:900; line-height:1; font-family:sans-serif; }
.eunit { font-size:11px; color:var(--dim); margin-top:2px; }
.arriving .emins { color:var(--red); }
.soon     .emins { color:var(--orange); }
.normal   .emins { color:var(--green); }
.noservice .emins { color:#555; font-size:20px; }

/* ── 右側天氣欄位 ── */
#weather-bar { background:var(--bg2); border-left:2px solid #222; flex:1; display:flex; flex-direction:column; align-items:center; justify-content:space-evenly; padding:20px 15px; flex-shrink:0; }
#w-main-info { display:flex; flex-direction:column; align-items:center; gap:8px; width:100%; }
#weather-temp { font-size:68px; font-weight:900; color:#ffffff; line-height:1; display:block; text-align:center; font-family:sans-serif; }
#weather-humidity { color:#4dadf7; font-size:24px; font-weight:900; letter-spacing:1px; }
#weather-desc { color:#e0e0e0; font-size:18px; font-weight:700; text-align:center; line-height:1.6; padding:0 10px; max-height:110px; overflow:hidden; }

/* 天氣警告圖標 */
#warning-badges { display:flex; flex-direction:row; flex-wrap:wrap; justify-content:center; gap:10px; width:100%; align-items:center; min-height: 60px; }
.warn-icon-img { height:60px; width:auto; display:block; }

/* Status & Ticker */
#statusbar { background:#080808; border-top:1px solid #222; font-size:11px; color:#666; padding:4px 14px; display:flex; justify-content:space-between; flex-shrink:0; }
#ticker { background:var(--gold); color:#000; font-weight:900; font-size:14px; padding:6px 0; overflow:hidden; white-space:nowrap; flex-shrink:0; }
#ticker-inner { display:inline-block; padding-left:100%; animation:sc 30s linear infinite; }
@keyframes sc { to { transform:translateX(-100%); } }

/* Loading 隱藏，讓畫面直接顯示 */
#loading { display:none; }
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <div><div id="stop-zh">衙前圍道</div><div id="stop-en">Nga Tsin Wai Road</div></div>
    <div><div id="clock">--:--</div><div id="dateline"></div></div>
  </div>
  <div id="main-container">
    <div id="eta-container">
      <div id="col-hdr"><span class="c1">路線 Route</span><span class="c2">目的地 Destination</span><span class="c3">到站 ETA</span></div>
      <div id="eta-list">
        <div style="padding: 20px; text-align: center; color: #888;">正在載入九巴資料... (若長時間未顯示，請檢查 Stop ID)</div>
      </div>
    </div>
    <div id="weather-bar">
      <div id="w-main-info"><span id="w-icon"></span><span id="weather-temp">--°C</span></div>
      <div id="weather-humidity">💧 --%</div>
      <div id="weather-desc">正在獲取天氣資訊…</div>
      <div id="warning-badges"></div>
    </div>
  </div>
  <div id="statusbar"><span id="last-update">尚未更新</span><span>系統自動維護 · KMB + HKO DATA</span></div>
  <div id="ticker"><span id="ticker-inner">🚌 乘車時請緊握扶手 · 禮讓座位予有需要人士 · 衙前圍道 Nga Tsin Wai Road</span></div>
</div>

<script>
// --- 路線與站點設定 ---
const ROUTES = [
  { route:'11D', destZh:'樂富',       destEn:'Lok Fu'            },
  { route:'75X', destZh:'大埔(富善)', destEn:'Tai Po (Fu Shin)'  },
  { route:'85',  destZh:'火炭',       destEn:'Fo Tan'            },
  { route:'85A', destZh:'廣源',       destEn:'Kwong Yuen'        },
  { route:'1',   destZh:'尖沙咀',     destEn:'Tsim Sha Tsui'     }
];

// ⚠️ 如果巴士 ETA 出不來，99%是這三個 ID 已經過期，請替換為最新的 KMB Stop ID
const stopIds = ["3529BA34A1BE33A7", "7209935E8E899496", "9976378A5BCEAF0B"]; 

// --- 天氣警告設定 (還原你的原始設定) ---
const WARN_LABEL = {'TC1':'一號戒備','TC3':'三號風球','TC8NE':'八號東北','TC8SE':'八號東南','TC8NW':'八號西北','TC8SW':'八號西南','TC9':'九號風球','TC10':'十號颶風','WRAINA':'黃色暴雨','WRAINR':'紅色暴雨','WRAINB':'黑色暴雨','WCOLD':'寒冷天氣','WHOT':'酷熱天氣','WFROST':'霜凍','WTS':'雷暴警告','WMSGNL':'強烈季候風','WFIREY':'黃色火災危險','WFIRED':'紅色火災危險'};
const WARN_ICON = {
  'TC1':'https://www.hko.gov.hk/tc/textonly/img/warn/images/tc1.gif','TC3':'https://www.hko.gov.hk/tc/textonly/img/warn/images/tc3.gif',
  'TC8NE':'https://www.hko.gov.hk/tc/textonly/img/warn/images/tc8ne.gif','TC8SE':'https://www.hko.gov.hk/tc/textonly/img/warn/images/tc8se.gif',
  'TC8NW':'https://www.hko.gov.hk/tc/textonly/img/warn/images/tc8nw.gif','TC8SW':'https://www.hko.gov.hk/tc/textonly/img/warn/images/tc8sw.gif',
  'TC9':'https://www.hko.gov.hk/tc/textonly/img/warn/images/tc9.gif','TC10':'https://www.hko.gov.hk/tc/textonly/img/warn/images/tc10.gif',
  'WRAINA':'https://www.hko.gov.hk/tc/textonly/img/warn/images/rain_amber.gif','WRAINR':'https://www.hko.gov.hk/tc/textonly/img/warn/images/rain_red.gif','WRAINB':'https://www.hko.gov.hk/tc/textonly/img/warn/images/rain_black.gif',
  'WCOLD':'https://www.hko.gov.hk/tc/textonly/img/warn/images/cold.gif','WHOT':'https://www.hko.gov.hk/tc/textonly/img/warn/images/vhot.gif','WFROST':'https://www.hko.gov.hk/tc/textonly/img/warn/images/frost.gif',
  'WTS':'https://www.hko.gov.hk/tc/textonly/img/warn/images/ts.gif','WMSGNL':'https://www.hko.gov.hk/tc/textonly/img/warn/images/sms.gif',
  'WFIREY':'https://www.hko.gov.hk/tc/textonly/img/warn/images/firey.gif','WFIRED':'https://www.hko.gov.hk/tc/textonly/img/warn/images/firer.gif'
};

// --- 時間更新 ---
function updateClock() {
  const now = new Date();
  const hh = ('0'+now.getHours()).slice(-2);
  const mm = ('0'+now.getMinutes()).slice(-2);
  document.getElementById('clock').textContent = `${hh}:${mm}`;
  const days = ['日','一','二','三','四','五','六'];
  document.getElementById('dateline').textContent = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 (${days[now.getDay()]})`;
}
setInterval(updateClock, 5000);
updateClock();

// --- 獲取九巴 ETA 資料 ---
async function fetchETA() {
  let etaData = {};
  ROUTES.forEach(r => etaData[r.route] = []);
  const now = new Date();
  
  for (const sid of stopIds) {
    try {
      const response = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${sid}`);
      if (!response.ok) continue; 
      
      const json = await response.json();
      if (json && json.data) {
        json.data.forEach(item => {
          if (etaData[item.route] !== undefined && item.eta) {
            const etaTime = new Date(item.eta);
            const mins = Math.floor((etaTime - now) / 60000);
            if (mins >= -1 && mins <= 90) {
              etaData[item.route].push(mins);
            }
          }
        });
      }
    } catch (error) {
      console.error(`獲取站點 ${sid} 失敗:`, error);
    }
  }

  renderETA(etaData);
  document.getElementById('last-update').textContent = '最後更新：' + new Date().toLocaleTimeString('zh-HK',{hour12:false});
}

// --- 渲染巴士畫面 ---
function renderETA(etaData) {
  const list = document.getElementById('eta-list');
  list.innerHTML = '';
  
  ROUTES.forEach(cfg => {
    let mins = etaData[cfg.route].sort((a,b) => a - b);
    mins = [...new Set(mins)]; // 移除重複的分鐘數
    
    const first = mins.length > 0 ? mins[0] : null;
    let cls = 'noservice';
    let minText = '–';
    let unitText = '暫無班次';
    
    if (first !== null) {
      cls = first <= 1 ? 'arriving' : (first <= 4 ? 'soon' : 'normal');
      minText = first <= 0 ? '▶' : first;
      unitText = first <= 0 ? '即將抵達' : '分鐘';
    }

    const row = document.createElement('div');
    row.className = `erow ${cls}`;
    row.innerHTML = `
      <div class="rnum">${cfg.route}</div>
      <div class="dblock">
        <div class="dlabel">往 To</div>
        <div class="dzh">${cfg.destZh}</div>
        <div class="den">${cfg.destEn}</div>
      </div>
      <div class="etabox">
        <div class="emins">${minText}</div>
        <div class="eunit">${unitText}</div>
      </div>
    `;
    list.appendChild(row);
  });
}

// --- 獲取天氣及警告資料 ---
async function fetchWeather() {
  try {
    // 1. 獲取基本天氣 (rhrread)
    const resObs = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc');
    const obs = await resObs.json();
    
    const tempObj = obs.temperature.data.find(i => i.place === '九龍城');
    const humidObj = obs.humidity.data.find(i => i.place === '香港天文台');

    if (tempObj) document.getElementById('weather-temp').textContent = Math.round(tempObj.value) + '°C';
    if (humidObj) document.getElementById('weather-humidity').textContent = '💧 ' + humidObj.value + '%';
    
    const iconCode = obs.icon[0] || 62;
    document.getElementById('w-icon').innerHTML = `<img src="https://www.hko.gov.hk/images/HKOWxIconOutline/pic${iconCode}.png" style="width:140px;height:140px;object-fit:contain;">`;
    document.getElementById('weather-desc').textContent = obs.text.substring(0, 60);

    // 2. 獲取天氣警告 (warnsum)
    const resWarn = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=tc');
    const warn = await resWarn.json();
    
    const badges = document.getElementById('warning-badges');
    badges.innerHTML = '';
    const tickerWarns = [];
    
    if (warn) {
      for (const code in warn) {
        if (warn[code].actionCode === 'ISSUE') {
          // 生成警告圖標
          const img = document.createElement('img');
          img.className = 'warn-icon-img';
          img.src = WARN_ICON[code];
          badges.appendChild(img);
          // 加入跑馬燈文字
          if (WARN_LABEL[code]) {
            tickerWarns.push(WARN_LABEL[code]);
          }
        }
      }
    }
    
    // 更新跑馬燈
    document.getElementById('ticker-inner').textContent = tickerWarns.length > 0 
      ? '⚠️ 天文台現正生效：' + tickerWarns.join(' ｜ ') + ' ｜ 🚌 請緊握扶手' 
      : '🚌 排隊候車，先落後上 ｜ 乘車時請緊握扶手，確保安全 ｜ 衙前圍道 Nga Tsin Wai Road';

  } catch (error) {
    console.error("天氣讀取失敗:", error);
    document.getElementById('weather-desc').textContent = "無法連線至天文台";
  }
}

// --- 啟動與定時更新 ---
fetchETA();
fetchWeather();
setInterval(fetchETA, 30000);     // 每 30 秒更新巴士
setInterval(fetchWeather, 120000); // 每 2 分鐘更新天氣
</script>
</body>
</html>
