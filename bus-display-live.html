<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>衙前圍道巴士站</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { --gold:#c8a400; --bg:#121212; --txt:#fff; }
html, body { height:100%; background:var(--bg); color:var(--txt); font-family:sans-serif; overflow:hidden; }
#app { display:flex; flex-direction:column; height:100vh; }
/* 頂部 Header */
#top-panel { display:flex; justify-content:space-between; align-items:center; padding:15px 20px; background:#1a1a1a; }
#stop-name { font-size:24px; font-weight:bold; }
#clock { font-size:48px; font-weight:bold; }
/* 中間列表 */
#eta-list { flex:1; display:flex; flex-direction:column; }
.row { display:flex; align-items:center; padding:15px 20px; border-bottom:1px solid #333; }
.route { width:80px; font-size:32px; font-weight:bold; }
.dest { flex:1; font-size:20px; }
.eta { font-size:32px; font-weight:bold; color:var(--gold); }
/* 底部天氣 */
#weather-bar { padding:15px 20px; background:#000; display:flex; align-items:center; gap:20px; font-size:24px; border-top:2px solid var(--gold); }
#ticker { background:var(--gold); color:#000; padding:5px 20px; font-weight:bold; white-space:nowrap; overflow:hidden; }
</style>
</head>
<body>
<div id="app">
  <div id="top-panel">
    <div id="stop-name">衙前圍道<br><span style="font-size:14px; color:#888;">Nga Tsin Wai Road</span></div>
    <div id="clock">--:--</div>
  </div>
  <div id="eta-list"></div>
  <div id="weather-bar">
    <span id="temp">--°C</span>
    <span id="humid">💧 --%</span>
  </div>
  <div id="ticker">🚌 排隊候車，先落後上 · Please queue · 衙前圍道 Nga Tsin Wai Road</div>
</div>

<script>
const ROUTES = ['11D','75X','85','85A','1'];
const destMap = {'11D':'樂富','75X':'大埔(富善)','85':'火炭','85A':'廣源','1':'尖沙咀'};

function update() {
  // 時間
  const now = new Date();
  document.getElementById('clock').textContent = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  
  // 模擬取數據 (您原本的邏輯)
  fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc')
    .then(r => r.json())
    .then(d => {
       const t = d.temperature.data.find(i => i.place === '九龍城')?.value || '--';
       const h = d.humidity.data.find(i => i.place === '九龍城')?.value || '--';
       document.getElementById('temp').textContent = t + '°C';
       document.getElementById('humid').textContent = '💧 ' + h + '%';
    });
}
setInterval(update, 60000);
update();
</script>
</body>
</html>
