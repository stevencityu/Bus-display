<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>衙前圍道巴士站</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --gold:#c8a400; --red:#e53935; --orange:#fb8c00; --green:#43a047;
  --bg:#0d0d0d; --bg2:#161616; --txt:#f0f0f0; --dim:#888;
}
html,body { height:100%; background:var(--bg); color:var(--txt); font-family:'Arial Black','Arial',sans-serif; overflow:hidden; }
#app { display:none; -webkit-flex-direction:column; flex-direction:column; height:100vh; }
#app.show { display:-webkit-flex; display:flex; }

/* Header */
#header {
  background:var(--bg2); border-bottom:3px solid var(--gold);
  display:-webkit-flex; display:flex;
  -webkit-align-items:center; align-items:center;
  -webkit-justify-content:space-between; justify-content:space-between;
  padding:8px 14px; -webkit-flex-shrink:0; flex-shrink:0;
}
#stop-zh { font-size:26px; font-weight:900; }
#stop-en { font-size:12px; color:var(--dim); margin-top:2px; }
#clock { font-size:52px; font-weight:900; letter-spacing:2px; line-height:1; }
#dateline { font-size:12px; color:var(--dim); text-align:right; margin-top:2px; }

/* 主體左右分欄容器 */
#main-container {
  -webkit-flex:1; flex:1;
  display:-webkit-flex; display:flex;
  -webkit-flex-direction:row; flex-direction:row;
  min-height:0; overflow:hidden;
}

/* 【關鍵修改】固定巴士板總寬度，徹底解決目的地太闊的問題 */
#eta-container {
  width: 540px; /* 固定合適寬度，不隨螢幕無限拉長 */
  -webkit-flex-shrink: 0; flex-shrink: 0;
  display:-webkit-flex; display:flex;
  -webkit-flex-direction:column; flex-direction:column;
  min-height:0;
}

/* 欄位標頭與內部闊度同步微調 */
#col-hdr {
  display:-webkit-flex; display:flex;
  background:var(--gold); color:#000; font-weight:900; font-size:14px;
  padding:5px 14px; -webkit-flex-shrink:0; flex-shrink:0;
}
#col-hdr .c1 { width:110px; }
#col-hdr .c2 { -webkit-flex:1; flex:1; }
#col-hdr .c3 { width:110px; text-align:right; } /* 加寬至 110px 避免時間單位擠壓 */

/* ETA list */
#eta-list { -webkit-flex:1; flex:1; display:-webkit-flex; display:flex; -webkit-flex-direction:column; flex-direction:column; gap:2px; padding:4px 0; overflow:hidden; }

.erow {
  display:-webkit-flex; display:flex;
  -webkit-align-items:center; align-items:center;
  padding:8px 14px; gap:8px;
  border-left:6px solid #333;
  -webkit-flex:1; flex:1; min-height:0;
}
.erow:nth-child(odd)  { background:#181818; }
.erow:nth-child(even) { background:#131313; }
.erow.arriving { border-left-color:var(--red); background:#1c0808; -webkit-animation:pr 1.4s infinite; animation:pr 1.4s infinite; }
.erow.soon     { border-left-color:var(--orange); background:#1a1000; }
.erow.normal   { border-left-color:var(--green); }
@-webkit-keyframes pr { 0%,100%{background:#1c0808} 50%{background:#2a0d0d} }
@keyframes pr { 0%,100%{background:#1c0808} 50%{background:#2a0d0d} }

.rnum { font-size:36px; font-weight:900; line-height:1; width:110px; -webkit-flex-shrink:0; flex-shrink:0; }
.dblock { -webkit-flex:1; flex:1; }
.dlabel { font-size:10px; color:var(--dim); }
.dzh { font-size:19px; font-weight:700; line-height:1.2; }
.den { font-size:11px; color:#999; }
.etabox { width:110px; text-align:right; -webkit-flex-shrink:0; flex-shrink:0; } /* 與標頭同步 */
.emins { font-size:40px; font-weight:900; line-height:1; }
.eunit { font-size:11px; color:var(--dim); }
.arriving .emins { color:var(--red); }
.soon     .emins { color:var(--orange); }
.normal   .emins { color:var(--green); }
.noservice .emins { color:#555; font-size:16px; }

/* ── 【關鍵修改】全新配色 + 霸佔右側所有剩餘空間的天氣欄位 ── */
#weather-bar {
  background:var(--bg2); border-left:2px solid #282828; /* 與系統相同的質感深灰色，完美融合 */
  -webkit-flex:1; flex:1; /* 自動吃掉右邊剩下所有空間，極致善用版面 */
  display:-webkit-flex; display:flex; 
  -webkit-flex-direction:column; flex-direction:column;
  -webkit-align-items:center; align-items:center;
  -webkit-justify-content:space-evenly; justify-content:space-evenly; /* 上下均勻分佈 */
  padding:30px 20px; -webkit-flex-shrink:0; flex-shrink:0;
}

/* 天氣資訊 */
#w-main-info { 
  display:-webkit-flex; display:flex; 
  -webkit-flex-direction:column; flex-direction:column;
  -webkit-align-items:center; align-items:center; 
  gap:8px; 
}
#w-icon { font-size:72px; line-height:1; display:block; }
#weather-temp { font-size:64px; font-weight:900; color:#ffffff; line-height:1; } /* 改為純白，消除突兀藍色 */
#weather-humidity { color:var(--dim); font-size:22px; font-weight:900; letter-spacing:1px; } /* 換上系統一致的灰色 */
#weather-desc { color:#d5d5d5; font-size:18px; font-weight:700; text-align:center; line-height:1.5; padding:0 12px; } /* 改為淺灰白 */

/* 天氣警告圖標容器：因為右邊空間變寬了，改為橫向置中包裹排列，畫面更具平衡感 */
#warning-badges { 
  display:-webkit-flex; display:flex; 
  -webkit-flex-direction:row; flex-direction:row; 
  -webkit-flex-wrap:wrap; flex-wrap:wrap;
  -webkit-justify-content:center; justify-content:center;
  gap:12px; width:100%; -webkit-align-items:center; align-items:center; 
}
.warn-icon-img {
  height:54px; width:auto; display:block;
  -webkit-animation:blink 1.2s infinite; animation:blink 1.2s infinite;
}
.warn-badge {
  padding:6px 12px; border-radius:4px; font-weight:900; font-size:16px;
  -webkit-animation:blink 1.2s infinite; animation:blink 1.2s infinite;
}
.wT3  { background:#ffcc00; color:#000; }
.wT8  { background:#ff6600; color:#fff; }
.wT10 { background:#cc0000; color:#fff; }
.wRED   { background:#c00; color:#fff; }
.wBLACK { background:#000; color:#fff; border:2px solid #fff; }
.wAMBER { background:#e65c00; color:#fff; }
.wCOLD  { background:#1a6ee6; color:#fff; }
.wHEAT  { background:#c62828; color:#fff; }
@-webkit-keyframes blink { 0%,100%{opacity:1} 50%{opacity:.5} }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.5} }

/* Status */
#statusbar {
  background:#0d0d0d; border-top:1px solid #222;
  font-size:10px; color:#555; padding:3px 14px;
  display:-webkit-flex; display:flex;
  -webkit-justify-content:space-between; justify-content:space-between;
  -webkit-flex-shrink:0; flex-shrink:0;
}

/* Ticker */
#ticker {
  background:var(--gold); color:#000; font-weight:700; font-size:13px;
  padding:5px 0; overflow:hidden; white-space:nowrap;
  -webkit-flex-shrink:0; flex-shrink:0;
}
#ticker-inner { display:inline-block; padding-left:100%; -webkit-animation:sc 35s linear infinite; animation:sc 35s linear infinite; }
@-webkit-keyframes sc { to { -webkit-transform:translateX(-100%); transform:translateX(-100%); } }
@keyframes sc { to { -webkit-transform:translateX(-100%); transform:translateX(-100%); } }

/* Loading */
#loading { position:fixed; inset:0; top:0; left:0; right:0; bottom:0; background:#0d0d0d; display:-webkit-flex; display:flex; -webkit-align-items:center; align-items:center; -webkit-justify-content:center; justify-content:center; z-index:99; -webkit-flex-direction:column; flex-direction:column; gap:12px; }
#loading-txt { color:#888; font-size:16px; }
.spin { width:36px; height:36px; border:4px solid #333; border-top-color:var(--gold); border-radius:50%; -webkit-animation:sp .8s linear infinite; animation:sp .8s linear infinite; }
@-webkit-keyframes sp { to { -webkit-transform:rotate(360deg); transform:rotate(360deg); } }
@keyframes sp { to { -webkit-transform:rotate(360deg); transform:rotate(360deg); } }
</style>
</head>
<body>

<div id="loading">
  <div class="spin"></div>
  <div id="loading-txt">正在載入…</div>
</div>

<div id="app">
  <div id="header">
    <div>
      <div id="stop-zh">衙前圍道</div>
      <div id="stop-en">Nga Tsin Wai Road</div>
    </div>
    <div>
      <div id="clock">--:--</div>
      <div id="dateline"></div>
    </div>
  </div>
  
  <div id="main-container">
    <!-- 左側巴士資訊固定寬度 -->
    <div id="eta-container">
      <div id="col-hdr">
        <span class="c1">路線 Route</span>
        <span class="c2">目的地 Destination</span>
        <span class="c3">到站 ETA</span>
      </div>
      <div id="eta-list"></div>
    </div>
    
    <!-- 右側延伸整合天氣欄 -->
    <div id="weather-bar">
      <div id="w-main-info">
        <span id="w-icon">🌡️</span>
        <span id="weather-temp">--°C</span>
      </div>
      <div id="weather-humidity"></div>
      <div id="weather-desc">載入中…</div>
      <div id="warning-badges"></div>
    </div>
  </div>

  <div id="statusbar">
    <span id="last-update">尚未更新</span>
    <span>每分鐘自動更新 · KMB + 天文台</span>
  </div>
  <div id="ticker"><span id="ticker-inner">🚌 排隊候車，先落後上 · Please queue · 衙前圍道 Nga Tsin Wai Road</span></div>
</div>

<script>
var ROUTES = [
  { route:'11D', destZh:'樂富',       destEn:'Lok Fu'            },
  { route:'75X', destZh:'大埔(富善)', destEn:'Tai Po (Fu Shin)'  },
  { route:'85',  destZh:'火炭',       destEn:'Fo Tan'            },
  { route:'85A', destZh:'廣源',       destEn:'Kwong Yuen'        },
  { route:'1',   destZh:'尖沙咀',     destEn:'Tsim Sha Tsui'     }
];

var stopIds = [];
var etaData = {};
var initDone = false;

// ── Clock ──
function updateClock() {
  var now = new Date();
  var hh = ('0'+now.getHours()).slice(-2);
  var mm = ('0'+now.getMinutes()).slice(-2);
  document.getElementById('clock').textContent = hh+':'+mm;
  var days=['日','一','二','三','四','五','六'];
  document.getElementById('dateline').textContent =
    now.getFullYear()+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日 ('+days[now.getDay()]+')';
}
setInterval(updateClock, 5000);
updateClock();

// ── XMLHttpRequest wrapper ──
function xhrGet(url, cb) {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.timeout = 10000;
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
      if (xhr.status === 200) {
        try { cb(null, JSON.parse(xhr.responseText)); }
        catch(e) { cb(e); }
      } else {
        cb(new Error('HTTP '+xhr.status));
      }
    }
  };
  xhr.ontimeout = function() { cb(new Error('timeout')); };
  xhr.onerror   = function() { cb(new Error('network')); };
  xhr.send();
}

// ── Find Stop IDs ──
function findStops(done) {
  document.getElementById('loading-txt').textContent = '搜尋巴士站…';
  xhrGet('https://data.etabus.gov.hk/v1/transport/kmb/stop', function(err, json) {
    if (err) { done(); return; }
    var found = [];
    var data = json.data || [];
    for (var i=0; i<data.length; i++) {
      var s = data[i];
      if (s.name_en && s.name_en.toUpperCase().indexOf('NGA TSIN WAI') !== -1) {
        found.push(s.stop);
      }
    }
    stopIds = found;
    done();
  });
}

// ── Fetch ETA ──
function fetchETA(done) {
  if (!stopIds.length) { if(done) done(); return; }
  var now = new Date();
  var newEta = {};
  for (var i=0; i<ROUTES.length; i++) newEta[ROUTES[i].route] = [];

  var remaining = stopIds.length;
  function finish() {
    remaining--;
    if (remaining <= 0) {
      for (var r in newEta) {
        var arr = newEta[r];
        arr.sort(function(a,b){return a-b;});
        var uniq = [];
        for (var j=0; j<arr.length; j++) {
          if (uniq.indexOf(arr[j]) === -1) uniq.push(arr[j]);
        }
        newEta[r] = uniq.slice(0,3);
      }
      etaData = newEta;
      renderETA();
      var ts = new Date();
      var hh=('0'+ts.getHours()).slice(-2), mm=('0'+ts.getMinutes()).slice(-2), ss=('0'+ts.getSeconds()).slice(-2);
      document.getElementById('last-update').textContent = '上次更新：'+hh+':'+mm+':'+ss;
      if (done) done();
    }
  }

  for (var s=0; s<stopIds.length; s++) {
    (function(sid) {
      xhrGet('https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/'+sid, function(err, json) {
        if (!err && json && json.data) {
          for (var k=0; k<json.data.length; k++) {
            var item = json.data[k];
            var wanted = null;
            for (var r=0; r<ROUTES.length; r++) {
              if (ROUTES[r].route === item.route) { wanted = ROUTES[r]; break; }
            }
            if (!wanted || !item.eta) continue;
            var diffMs = new Date(item.eta) - now;
            var mins = Math.round(diffMs / 60000);
            if (mins >= -1 && mins <= 90) newEta[item.route].push(mins);
          }
        }
        finish();
      });
    })(stopIds[s]);
  }
}

// ── Render ──
function renderETA() {
  var list = document.getElementById('eta-list');
  list.innerHTML = '';
  for (var i=0; i<ROUTES.length; i++) {
    var cfg = ROUTES[i];
    var mins = etaData[cfg.route] || [];
    var first = mins.length ? mins[0] : null;
    var cls = 'noservice';
    if (first !== null) {
      if (first <= 1) cls = 'arriving';
      else if (first <= 4) cls = 'soon';
      else cls = 'normal';
    }
    var minsDisplay = first === null ? '–' : (first <= 0 ? '▶' : first);
    var unitDisplay = first === null ? '暫無班次' : (first <= 0 ? '即將抵達' : '分鐘');
    var nextArr = mins.slice(1);
    var nextHint = '';
    for (var j=0; j<nextArr.length; j++) nextHint += (j?'/':'')+nextArr[j]+'分';

    var row = document.createElement('div');
    row.className = 'erow '+cls;
    row.innerHTML =
      '<div class="rnum">'+cfg.route+'</div>'+
      '<div class="dblock">'+
        '<div class="dlabel">往 To</div>'+
        '<div class="dzh">'+cfg.destZh+'</div>'+
        '<div class="den">'+cfg.destEn+(nextHint?' <span style="color:#666;font-size:.85em">'+nextHint+'</span>':'')+'</div>'+
      '</div>'+
      '<div class="etabox">'+
        '<div class="emins">'+minsDisplay+'</div>'+
        '<div class="eunit">'+unitDisplay+'</div>'+
      '</div>';
    list.appendChild(row);
  }
}

// ── Weather Data Mapping ──
var WARN_LABEL = {
  'TC_SIGNAL_1':'🌀 一號戒備','TC_SIGNAL_3':'🌀 三號風球','TC_SIGNAL_8_NE':'🌀 八號東北','TC_SIGNAL_8_SE':'🌀 八號東南',
  'TC_SIGNAL_8_NW':'🌀 八號西北','TC_SIGNAL_8_SW':'🌀 八號西南','TC_SIGNAL_9':'🌀 九號風球','TC_SIGNAL_10':'🌀 十號颶風',
  'RAINSTORM_WARNING_AMBER':'🟡 黃色暴雨','RAINSTORM_WARNING_RED':'🔴 紅色暴雨','RAINSTORM_WARNING_BLACK':'⚫ 黑色暴雨',
  'COLD_WEATHER_WARNING':'🔵 寒冷天氣','HOT_WEATHER_WARNING':'🔴 酷熱天氣','FROST_WARNING':'❄️ 霜凍',
  'THUNDERSTORM_WARNING':'⚡ 雷暴警告','STRONG_MONSOON_SIGNAL':'🍃 強烈季候風'
};

var WARN_ICON = {
  'TC_SIGNAL_1': 'https://www.hko.gov.hk/common/images/warning_icons/tc1.gif',
  'TC_SIGNAL_3': 'https://www.hko.gov.hk/common/images/warning_icons/tc3.gif',
  'TC_SIGNAL_8_NE': 'https://www.hko.gov.hk/common/images/warning_icons/tc8ne.gif',
  'TC_SIGNAL_8_SE': 'https://www.hko.gov.hk/common/images/warning_icons/tc8se.gif',
  'TC_SIGNAL_8_NW': 'https://www.hko.gov.hk/common/images/warning_icons/tc8nw.gif',
  'TC_SIGNAL_8_SW': 'https://www.hko.gov.hk/common/images/warning_icons/tc8sw.gif',
  'TC_SIGNAL_9': 'https://www.hko.gov.hk/common/images/warning_icons/tc9.gif',
  'TC_SIGNAL_10': 'https://www.hko.gov.hk/common/images/warning_icons/tc10.gif',
  'RAINSTORM_WARNING_AMBER': 'https://www.hko.gov.hk/common/images/warning_icons/rain_amber.gif',
  'RAINSTORM_WARNING_RED': 'https://www.hko.gov.hk/common/images/warning_icons/rain_red.gif',
  'RAINSTORM_WARNING_BLACK': 'https://www.hko.gov.hk/common/images/warning_icons/rain_black.gif',
  'COLD_WEATHER_WARNING': 'https://www.hko.gov.hk/common/images/warning_icons/cold.gif',
  'HOT_WEATHER_WARNING': 'https://www.hko.gov.hk/common/images/warning_icons/vhot.gif',
  'FROST_WARNING': 'https://www.hko.gov.hk/common/images/warning_icons/frost.gif',
  'THUNDERSTORM_WARNING': 'https://www.hko.gov.hk/common/images/warning_icons/ts.gif',
  'STRONG_MONSOON_SIGNAL': 'https://www.hko.gov.hk/common/images/warning_icons/sms.gif'
};

var WARN_CSS = {
  'TC_SIGNAL_3':'wT3','TC_SIGNAL_8_NE':'wT8','TC_SIGNAL_8_SE':'wT8','TC_SIGNAL_8_NW':'wT8','TC_SIGNAL_8_SW':'wT8','TC_SIGNAL_9':'wT8','TC_SIGNAL_10':'wT10',
  'RAINSTORM_WARNING_AMBER':'wAMBER','RAINSTORM_WARNING_RED':'wRED','RAINSTORM_WARNING_BLACK':'wBLACK',
  'COLD_WEATHER_WARNING':'wCOLD','HOT_WEATHER_WARNING':'wHEAT','FROST_WARNING':'wCOLD'
};
var ICONS = {50:'☀️',51:'🌤️',52:'🌤️',53:'⛅',54:'🌧️',60:'🌧️',61:'⛈️',62:'⛈️',63:'🌩️',64:'🌩️',65:'🌧️',70:'☁️',71:'☁️',76:'🌫️',80:'🌦️',85:'⛈️',90:'🌡️'};

function fetchWeather() {
  xhrGet('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc', function(err, obs) {
    if (!err && obs) {
      var temp='--', humid='--';
      var tArr = obs.temperature&&obs.temperature.data||[];
      for(var i=0;i<tArr.length;i++){if(tArr[i].place==='九龍城'){temp=Math.round(tArr[i].value);break;}}
      if(temp==='--'&&tArr.length) temp=Math.round(tArr[0].value);
      var hArr = obs.humidity&&obs.humidity.data||[];
      for(var j=0;j<hArr.length;j++){if(hArr[j].place==='九龍城'){humid=hArr[j].value;break;}}
      if(humid==='--'&&hArr.length) humid=hArr[0].value;
      var icon = obs.icon&&obs.icon[0] ? (ICONS[obs.icon[0]]||'🌡️') : '🌡️';
      var desc = obs.text ? obs.text.substring(0,50) : '';
      document.getElementById('w-icon').textContent = icon;
      document.getElementById('weather-temp').textContent = temp+'°C';
      document.getElementById('weather-desc').textContent = desc;
      document.getElementById('weather-humidity').textContent = '💧 '+humid+'%';
    }
  });
  
  xhrGet('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=tc', function(err, warn) {
    if (err || !warn) return;
    var badges = document.getElementById('warning-badges');
    badges.innerHTML = '';
    var tickerWarns = [];
    for (var code in warn) {
      if (warn[code] && warn[code].inForce) {
        var label = WARN_LABEL[code] || code;
        var iconUrl = WARN_ICON[code];
        
        if (iconUrl) {
          var img = document.createElement('img');
          img.className = 'warn-icon-img';
          img.src = iconUrl;
          img.alt = label;
          badges.appendChild(img);
        } else {
          var css = WARN_CSS[code] || 'wT3';
          var b = document.createElement('span');
          b.className = 'warn-badge ' + css;
          b.textContent = label;
          badges.appendChild(b);
        }
        tickerWarns.push(label);
      }
    }
    if (tickerWarns.length) {
      document.getElementById('ticker-inner').textContent =
        '⚠️ '+tickerWarns.join('  │  ')+'  │  排隊候車，先落後上 Please queue and let passengers alight first';
    }
  });
}

// ── Boot ──
findStops(function() {
  document.getElementById('loading-txt').textContent = '載入到站時間…';
  fetchETA(function() {
    fetchWeather();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').className = 'show';
    setInterval(fetchETA, 60000);
    setInterval(fetchWeather, 300000);
  });
});
</script>
</body>
</html>
