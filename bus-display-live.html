<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>衙前圍道巴士站 - 電子資訊牌</title>
<style>
    /* 原有 CSS 保持不變，略過以節省篇幅 */
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d0d0d; color:#f0f0f0; font-family:sans-serif; overflow:hidden; height:100vh; }
    #app { display:flex; flex-direction:column; height:100vh; }
    #header { background:#161616; padding:15px; border-bottom:3px solid #c8a400; }
    #eta-list { flex:1; overflow:hidden; }
    .erow { display:flex; padding:10px; border-bottom:1px solid #333; align-items:center; }
    .rnum { width:80px; font-weight:bold; color:#c8a400; }
    .emins { font-size:24px; color:#43a047; }
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <h1 id="stop-zh">衙前圍道</h1>
    <div id="clock">--:--</div>
  </div>
  <div id="eta-list"></div>
  <div id="weather-bar">
    <div id="weather-temp">--°C</div>
    <div id="weather-desc">讀取中...</div>
  </div>
</div>

<script>
// 使用代理 URL 解決 CORS 問題
const PROXY = 'https://api.allorigins.win/get?url=';
const KMB_API = 'https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/';
const HKO_API = 'https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc';

const stopIds = ["3529BA34A1BE33A7"]; // 你的站點ID

async function fetchJson(url) {
    try {
        const response = await fetch(PROXY + encodeURIComponent(url));
        const data = await response.json();
        return JSON.parse(data.contents);
    } catch (e) {
        console.error("Fetch failed", e);
        return null;
    }
}

async function updateETA() {
    const list = document.getElementById('eta-list');
    list.innerHTML = '讀取中...';
    
    // 範例：抓取第一個站點
    const data = await fetchJson(KMB_API + stopIds[0]);
    if(data && data.data) {
        list.innerHTML = '';
        data.data.slice(0, 5).forEach(item => {
            const div = document.createElement('div');
            div.className = 'erow';
            div.innerHTML = `<span class="rnum">${item.route}</span><span>${item.eta ? Math.round((new Date(item.eta) - new Date())/60000) + ' 分鐘' : '暫無'}</span>`;
            list.appendChild(div);
        });
    }
}

async function updateWeather() {
    const data = await fetchJson(HKO_API);
    if(data) {
        const temp = data.temperature.data.find(i => i.place === '九龍城').value;
        document.getElementById('weather-temp').textContent = temp + '°C';
        document.getElementById('weather-desc').textContent = data.forecastDesc;
    }
}

// 啟動
setInterval(updateETA, 60000);
setInterval(updateWeather, 300000);
updateETA();
updateWeather();
document.getElementById('clock').textContent = new Date().toLocaleTimeString();
</script>
</body>
</html>
