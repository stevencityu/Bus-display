<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>衙前圍道巴士站</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --gold: #c8a400;
    --red:  #e53935;
    --orange: #fb8c00;
    --green: #43a047;
    --bg: #0d0d0d;
    --bg2: #161616;
    --bg3: #1e1e1e;
    --txt: #f0f0f0;
    --dim: #888;
  }
  html, body { height:100%; background:var(--bg); color:var(--txt); font-family:'Arial Black','Arial',sans-serif; overflow:hidden; }

  /* ── Layout ── */
  #app { display:flex; flex-direction:column; height:100vh; }

  /* ── Weather bar ── */
  #weather-bar {
    background:#0a1628;
    border-bottom:2px solid #1e3a5f;
    display:flex; align-items:center; gap:16px;
    padding:6px 16px; flex-shrink:0;
    font-size:clamp(11px,1.8vw,14px);
  }
  #weather-icon { font-size:clamp(20px,3vw,26px); }
  #weather-temp { font-size:clamp(20px,3.5vw,28px); font-weight:900; color:#7eb8f7; }
  #weather-desc { color:#aac4e8; flex:1; }
  #weather-humidity { color:#7eb8f7; }
  #warning-badges { display:flex; gap:6px; flex-wrap:wrap; }
  .warn-badge {
    padding:3px 10px; border-radius:4px; font-weight:900;
    font-size:clamp(10px,1.6vw,13px); letter-spacing:0.5px;
    animation: blink 1.2s infinite;
  }
  .warn-T3  { background:#ffcc00; color:#000; }
  .warn-T8  { background:#ff6600; color:#fff; }
  .warn-T10 { background:#cc0000; color:#fff; }
  .warn-RAINSTORM-RED    { background:#c00; color:#fff; }
  .warn-RAINSTORM-BLACK  { background:#000; color:#fff; border:2px solid #fff; }
  .warn-RAINSTORM-AMBER  { background:#e65c00; color:#fff; }
  .warn-COLD  { background:#1a6ee6; color:#fff; }
  .warn-HEAT  { background:#c62828; color:#fff; }
  .warn-FROST { background:#0077b6; color:#fff; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.55} }

  /* ── Header ── */
  #header {
    background:var(--bg2); border-bottom:3px solid var(--gold);
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 16px; flex-shrink:0;
  }
  #stop-name-zh { font-size:clamp(18px,4vw,30px); font-weight:900; }
  #stop-name-en { font-size:clamp(10px,1.8vw,14px); color:var(--dim); margin-top:2px; }
  #clock { font-size:clamp(34px,7vw,58px); font-weight:900; font-variant-numeric:tabular-nums; line-height:1; }
  #date-line { font-size:clamp(10px,1.6vw,13px); color:var(--dim); text-align:right; margin-top:2px; }

  /* ── Col headers ── */
  #col-headers {
    display:grid; grid-template-columns:110px 1fr 100px;
    background:var(--gold); color:#000; font-weight:900;
    font-size:clamp(11px,2vw,15px); padding:5px 14px; gap:8px; flex-shrink:0;
  }
  #col-headers span:last-child { text-align:right; }

  /* ── ETA list ── */
  #eta-list { flex:1; display:flex; flex-direction:column; gap:2px; padding:4px 0; overflow:hidden; }

  .eta-row {
    display:grid; grid-template-columns:110px 1fr 100px;
    align-items:center; padding:8px 14px; gap:8px;
    border-left:6px solid transparent; flex:1; min-height:0;
    transition:background .3s;
  }
  .eta-row:nth-child(odd)  { background:#181818; }
  .eta-row:nth-child(even) { background:#131313; }
  .eta-row.arriving { border-left-color:var(--red); background:#1c0808; animation:pulse-r 1.4s infinite; }
  .eta-row.soon     { border-left-color:var(--orange); background:#1a1000; }
  .eta-row.normal   { border-left-color:var(--green); }
  .eta-row.noservice{ border-left-color:#444; }
  @keyframes pulse-r { 0%,100%{background:#1c0808} 50%{background:#2a0d0d} }

  .route-num { font-size:clamp(22px,5vw,40px); font-weight:900; line-height:1; }
  .dest-label { font-size:clamp(8px,1.4vw,11px); color:var(--dim); }
  .dest-zh    { font-size:clamp(13px,2.8vw,21px); font-weight:700; line-height:1.15; }
  .dest-en    { font-size:clamp(9px,1.6vw,12px); color:#999; }
  .eta-time   { text-align:right; }
  .eta-mins   { font-size:clamp(26px,5.5vw,46px); font-weight:900; line-height:1; font-variant-numeric:tabular-nums; }
  .eta-unit   { font-size:clamp(9px,1.5vw,12px); color:var(--dim); }
  .arriving .eta-mins { color:var(--red); }
  .soon     .eta-mins { color:var(--orange); }
  .normal   .eta-mins { color:var(--green); }
  .noservice .eta-mins { color:#555; font-size:clamp(13px,2.5vw,18px); }

  /* ── Status bar ── */
  #status-bar {
    background:#0d0d0d; border-top:1px solid #222;
    font-size:clamp(9px,1.4vw,11px); color:#555;
    padding:3px 14px; display:flex; justify-content:space-between;
    flex-shrink:0;
  }

  /* ── Ticker ── */
  #ticker {
    background:var(--gold); color:#000; font-weight:700;
    font-size:clamp(11px,1.8vw,14px); padding:5px 0;
    overflow:hidden; white-space:nowrap; flex-shrink:0;
  }
  #ticker-inner { display:inline-block; animation:scroll 35s linear infinite; padding-left:100vw; }
  @keyframes scroll { to { transform:translateX(-100%); } }

  /* ── Loading ── */
  #loading { position:fixed; inset:0; background:#0d0d0d; display:flex; align-items:center; justify-content:center; z-index:99; flex-direction:column; gap:12px; }
  #loading-txt { color:#888; font-size:16px; }
  .spinner { width:36px; height:36px; border:4px solid #333; border-top-color:var(--gold); border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><div id="loading-txt">正在載入巴士資料…</div></div>

<div id="app" style="display:none">
  <!-- Weather -->
  <div id="weather-bar">
    <span id="weather-icon">🌡️</span>
    <span id="weather-temp">--°C</span>
    <span id="weather-desc">載入中…</span>
    <span id="weather-humidity"></span>
    <div id="warning-badges"></div>
  </div>

  <!-- Header -->
  <div id="header">
    <div>
      <div id="stop-name-zh">衙前圍道</div>
      <div id="stop-name-en">Nga Tsin Wai Road</div>
    </div>
    <div>
      <div id="clock">--:--</div>
      <div id="date-line"></div>
    </div>
  </div>

  <!-- Col headers -->
  <div id="col-headers">
    <span>路線 Route</span>
    <span>目的地 Destination</span>
    <span>到站 ETA</span>
  </div>

  <!-- ETA rows -->
  <div id="eta-list"></div>

  <!-- Status -->
  <div id="status-bar">
    <span id="last-update">尚未更新</span>
    <span>每分鐘自動更新 · HK Observatory / KMB API</span>
  </div>

  <!-- Ticker -->
  <div id="ticker"><span id="ticker-inner">載入公告中…</span></div>
</div>

<script>
// ════════════════════════════════
//  CONFIG — 你想顯示的路線 + 目的地
// ════════════════════════════════
const ROUTES_WANTED = [
  { route:'11D', dir:'O', dest_tc:'樂富',      dest_en:'Lok Fu'           },
  { route:'75X', dir:'O', dest_tc:'大埔(富善)', dest_en:'Tai Po (Fu Shin)' },
  { route:'85',  dir:'O', dest_tc:'火炭',      dest_en:'Fo Tan'           },
  { route:'85A', dir:'O', dest_tc:'廣源',      dest_en:'Kwong Yuen'       },
  { route:'1',   dir:'O', dest_tc:'尖沙咀',    dest_en:'Tsim Sha Tsui'    },
];

// Stop IDs to search — 衙前圍道附近多個站
// 個 HTML 會自己喺 API 搵，唔需要硬編碼
const STOP_NAME_KEYWORDS = ['NGA TSIN WAI'];

// ════════════════════════════════
//  STATE
// ════════════════════════════════
let stopIds = [];       // discovered stop IDs
let etaData = {};       // route -> mins[]
let weatherData = {};
let warningData = [];

// ════════════════════════════════
//  CLOCK
// ════════════════════════════════
function updateClock() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent = `${hh}:${mm}`;
  const days=['日','一','二','三','四','五','六'];
  document.getElementById('date-line').textContent =
    `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 (${days[now.getDay()]})`;
}
setInterval(updateClock, 5000);
updateClock();

// ════════════════════════════════
//  FIND STOP IDs FROM KMB API
// ════════════════════════════════
async function findStopIds() {
  try {
    const r = await fetch('https://data.etabus.gov.hk/v1/transport/kmb/stop');
    const json = await r.json();
    const found = json.data.filter(s =>
      STOP_NAME_KEYWORDS.some(kw => s.name_en && s.name_en.toUpperCase().includes(kw))
    );
    stopIds = found.map(s => s.stop);
    console.log('Found stops:', found.map(s=>s.name_en+' '+s.stop));
  } catch(e) {
    console.error('Stop lookup failed', e);
  }
}

// ════════════════════════════════
//  FETCH ETA
// ════════════════════════════════
async function fetchETA() {
  if (!stopIds.length) return;
  const now = new Date();
  const newEta = {};
  ROUTES_WANTED.forEach(r => newEta[r.route] = []);

  for (const stopId of stopIds) {
    try {
      const r = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${stopId}`);
      const json = await r.json();
      for (const item of (json.data || [])) {
        const wanted = ROUTES_WANTED.find(w => w.route === item.route);
        if (!wanted) continue;
        if (!item.eta) continue;
        const diffMs = new Date(item.eta) - now;
        const mins = Math.round(diffMs / 60000);
        if (mins >= -1 && mins <= 90) {
          newEta[item.route].push(mins);
        }
      }
    } catch(e) { console.warn('ETA fetch err', stopId, e); }
  }

  // deduplicate & sort
  Object.keys(newEta).forEach(k => {
    newEta[k] = [...new Set(newEta[k])].sort((a,b)=>a-b).slice(0,3);
  });
  etaData = newEta;
  renderETA();

  const ts = new Date().toLocaleTimeString('zh-HK');
  document.getElementById('last-update').textContent = `上次更新：${ts}`;
}

// ════════════════════════════════
//  RENDER ETA ROWS
// ════════════════════════════════
function renderETA() {
  const list = document.getElementById('eta-list');
  list.innerHTML = '';

  ROUTES_WANTED.forEach(cfg => {
    const mins = etaData[cfg.route] || [];
    const firstMins = mins.length ? mins[0] : null;

    let cls = 'noservice';
    if (firstMins !== null) {
      if (firstMins <= 1) cls = 'arriving';
      else if (firstMins <= 4) cls = 'soon';
      else cls = 'normal';
    }

    let minsDisplay = '–';
    let unitDisplay = '暫無班次';
    if (firstMins !== null) {
      if (firstMins <= 0) { minsDisplay = '▶'; unitDisplay = '即將抵達'; }
      else { minsDisplay = firstMins; unitDisplay = `分鐘`; }
    }

    // Next buses hint
    const nextHint = mins.slice(1).map(m => `${m}分`).join(' / ');

    const row = document.createElement('div');
    row.className = `eta-row ${cls}`;
    row.innerHTML = `
      <div class="route-num">${cfg.route}</div>
      <div>
        <div class="dest-label">往 To</div>
        <div class="dest-zh">${cfg.dest_tc}</div>
        <div class="dest-en">${cfg.dest_en}${nextHint ? ` <span style="color:#666;font-size:.85em">/ ${nextHint}</span>` : ''}</div>
      </div>
      <div class="eta-time">
        <div class="eta-mins">${minsDisplay}</div>
        <div class="eta-unit">${unitDisplay}</div>
      </div>
    `;
    list.appendChild(row);
  });
}

// ════════════════════════════════
//  WEATHER — HK Observatory
// ════════════════════════════════
const WEATHER_ICONS = {
  50:'☀️',51:'🌤️',52:'🌤️',53:'⛅',54:'🌧️',60:'🌧️',61:'⛈️',62:'⛈️',
  63:'🌩️',64:'🌩️',65:'🌧️',70:'☁️',71:'☁️',72:'☁️',73:'☁️',74:'☁️',75:'☁️',
  76:'🌫️',77:'🌫️',80:'🌦️',81:'🌦️',82:'🌦️',83:'🌦️',84:'🌦️',85:'⛈️',
  90:'🌡️',91:'🌡️',92:'🌡️',93:'🌡️'
};
const WARN_MAP = {
  'TC_SIGNAL_3':'🌀 三號風球', 'TC_SIGNAL_8_NE':'🌀 八號東北', 'TC_SIGNAL_8_SE':'🌀 八號東南',
  'TC_SIGNAL_8_NW':'🌀 八號西北', 'TC_SIGNAL_8_SW':'🌀 八號西南',
  'TC_SIGNAL_9':'🌀 九號風球', 'TC_SIGNAL_10':'🌀 十號颶風',
  'RAINSTORM_WARNING_AMBER':'🟡 黃色暴雨', 'RAINSTORM_WARNING_RED':'🔴 紅色暴雨',
  'RAINSTORM_WARNING_BLACK':'⚫ 黑色暴雨',
  'COLD_WEATHER_WARNING':'🔵 寒冷天氣', 'HOT_WEATHER_WARNING':'🔴 酷熱天氣',
  'FROST_WARNING':'❄️ 霜凍警告', 'FIRE_DANGER_WARNING_RED':'🔥 火災危險'
};
const WARN_CSS = {
  'TC_SIGNAL_3':'warn-T3','TC_SIGNAL_8_NE':'warn-T8','TC_SIGNAL_8_SE':'warn-T8',
  'TC_SIGNAL_8_NW':'warn-T8','TC_SIGNAL_8_SW':'warn-T8',
  'TC_SIGNAL_9':'warn-T8','TC_SIGNAL_10':'warn-T10',
  'RAINSTORM_WARNING_AMBER':'warn-RAINSTORM-AMBER',
  'RAINSTORM_WARNING_RED':'warn-RAINSTORM-RED',
  'RAINSTORM_WARNING_BLACK':'warn-RAINSTORM-BLACK',
  'COLD_WEATHER_WARNING':'warn-COLD','HOT_WEATHER_WARNING':'warn-HEAT',
  'FROST_WARNING':'warn-FROST'
};

async function fetchWeather() {
  try {
    const [obsR, warnR] = await Promise.all([
      fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc'),
      fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=tc')
    ]);
    const obs  = await obsR.json();
    const warn = await warnR.json();

    // Temperature — find 九龍城 or closest
    let temp = '--';
    let humid = '--';
    const tempArr = obs.temperature?.data || [];
    const kln = tempArr.find(d => d.place === '九龍城') || tempArr[0];
    if (kln) temp = Math.round(kln.value);
    const humArr = obs.humidity?.data || [];
    const klnH = humArr.find(d => d.place === '九龍城') || humArr[0];
    if (klnH) humid = klnH.value;

    // Icon from weather icon
    const iconCode = obs.icon?.[0];
    const icon = WEATHER_ICONS[iconCode] || '🌡️';

    // Description
    const desc = obs.text || '';

    document.getElementById('weather-icon').textContent = icon;
    document.getElementById('weather-temp').textContent = `${temp}°C`;
    document.getElementById('weather-desc').textContent = desc.substring(0,60);
    document.getElementById('weather-humidity').textContent = `💧 ${humid}%`;

    // Warnings
    const badges = document.getElementById('warning-badges');
    badges.innerHTML = '';
    const activeWarnings = [];
    for (const [code, info] of Object.entries(warn)) {
      if (info && info.inForce) {
        activeWarnings.push({ code, label: WARN_MAP[code] || code });
      }
    }
    activeWarnings.forEach(w => {
      const b = document.createElement('span');
      b.className = `warn-badge ${WARN_CSS[w.code] || 'warn-T3'}`;
      b.textContent = w.label;
      badges.appendChild(b);
    });

    // Update ticker with warnings
    if (activeWarnings.length) {
      const warnText = activeWarnings.map(w=>w.label).join('  │  ');
      updateTicker(`⚠️ ${warnText}  │  天文台溫度：${temp}°C  濕度：${humid}%  │  排隊候車，先落後上 Please queue and let passengers alight first`);
    }

  } catch(e) { console.warn('Weather fetch err', e); }
}

function updateTicker(text) {
  document.getElementById('ticker-inner').textContent = text;
}

// ════════════════════════════════
//  INIT & LOOP
// ════════════════════════════════
async function init() {
  document.getElementById('loading-txt').textContent = '正在搜尋巴士站…';
  await findStopIds();

  document.getElementById('loading-txt').textContent = '載入到站時間…';
  await Promise.all([fetchETA(), fetchWeather()]);

  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  // Default ticker
  updateTicker('🚌 排隊候車，先落後上  │  Please queue and let passengers alight first  │  衙前圍道 Nga Tsin Wai Road  │  資料來源：九巴 KMB API + 香港天文台');

  // Refresh every 60s
  setInterval(fetchETA, 60000);
  // Refresh weather every 5 min
  setInterval(fetchWeather, 300000);
}

init();
</script>
</body>
</html>
